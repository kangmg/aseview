name: Publish VS Code Extension

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "none"
        type: choice
        options:
          - none
          - marketplace
          - openvsx
          - both
      release_tag:
        description: "Optional GitHub release tag to create/update with the VSIX asset"
        required: false
        default: ""
        type: string

jobs:
  build-vsix:
    runs-on: ubuntu-latest
    outputs:
      version_filename: ${{ steps.vsix.outputs.version_filename }}
      latest_filename: ${{ steps.vsix.outputs.latest_filename }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Resolve VSIX filename
        id: vsix
        working-directory: vscode-extension
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "version_filename=aseview-vscode-${version}.vsix" >> "$GITHUB_OUTPUT"
          echo "latest_filename=aseview-latest.vsix" >> "$GITHUB_OUTPUT"

      - name: Package VSIX
        working-directory: vscode-extension
        run: |
          npm run package -- --out "${{ steps.vsix.outputs.version_filename }}"
          cp "${{ steps.vsix.outputs.version_filename }}" "${{ steps.vsix.outputs.latest_filename }}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: aseview-vsix
          path: |
            vscode-extension/${{ steps.vsix.outputs.version_filename }}
            vscode-extension/${{ steps.vsix.outputs.latest_filename }}

  attach-release-asset:
    if: >
      github.event_name == 'release' ||
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    needs: build-vsix
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: aseview-vsix
          path: dist

      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.release_tag }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release with VSIX
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${{ steps.release.outputs.tag }}"
          version_asset="dist/${{ needs.build-vsix.outputs.version_filename }}"
          latest_asset="dist/${{ needs.build-vsix.outputs.latest_filename }}"
          assets=("$version_asset" "$latest_asset")

          for asset in "${assets[@]}"; do
            if [ ! -f "$asset" ]; then
              echo "::error::VSIX artifact not found at $asset"
              find dist -maxdepth 2 -type f -print
              exit 1
            fi
          done

          if gh release view "$tag" >/dev/null 2>&1; then
            immutable="$(gh api "repos/${GH_REPO}/releases/tags/${tag}" --jq '.immutable // false')"
            if [ "$immutable" = "true" ]; then
              asset_names="$(gh api "repos/${GH_REPO}/releases/tags/${tag}" --jq '.assets[].name')"
              missing=0
              for asset in "${assets[@]}"; do
                if ! printf '%s\n' "$asset_names" | grep -Fxq "$(basename "$asset")"; then
                  echo "::error::Release $tag is immutable and is missing $(basename "$asset"). Delete/recreate the release or let this workflow create it from the tag."
                  missing=1
                fi
              done
              if [ "$missing" -ne 0 ]; then
                exit 1
              fi
              echo "Release $tag is immutable and already has all VSIX assets; nothing to upload."
              exit 0
            fi
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" --title "$tag" --notes "Release $tag" --latest
          fi

  publish-marketplace:
    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'marketplace' || github.event.inputs.target == 'both')
    needs: build-vsix
    runs-on: ubuntu-latest
    steps:
      - name: Check Visual Studio Marketplace token
        id: token
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "VSCE_PAT secret is not configured; skipping Marketplace publish."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download VSIX artifact
        if: steps.token.outputs.configured == 'true'
        uses: actions/download-artifact@v4
        with:
          name: aseview-vsix
          path: dist

      - name: Publish to Visual Studio Marketplace
        if: steps.token.outputs.configured == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --packagePath dist/aseview-latest.vsix -p "$VSCE_PAT"

  publish-openvsx:
    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'openvsx' || github.event.inputs.target == 'both')
    needs: build-vsix
    runs-on: ubuntu-latest
    steps:
      - name: Check Open VSX token
        id: token
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "OVSX_PAT secret is not configured; skipping Open VSX publish."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download VSIX artifact
        if: steps.token.outputs.configured == 'true'
        uses: actions/download-artifact@v4
        with:
          name: aseview-vsix
          path: dist

      - name: Publish to Open VSX
        if: steps.token.outputs.configured == 'true'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx --yes ovsx publish dist/aseview-latest.vsix -p "$OVSX_PAT"
