name: Publish VS Code Extension

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "both"
        type: choice
        options:
          - marketplace
          - openvsx
          - both

jobs:
  build-vsix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Package VSIX
        working-directory: vscode-extension
        run: npm run package -- --out aseview.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: aseview-vsix
          path: vscode-extension/aseview.vsix

  attach-release-asset:
    if: github.event_name == 'release'
    needs: build-vsix
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: aseview-vsix
          path: dist

      - name: Attach VSIX to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/aseview.vsix --clobber

  publish-marketplace:
    if: >
      (
        github.event_name == 'release' ||
        (github.event_name == 'workflow_dispatch' &&
         (github.event.inputs.target == 'marketplace' || github.event.inputs.target == 'both'))
      )
    needs: build-vsix
    runs-on: ubuntu-latest
    steps:
      - name: Check Visual Studio Marketplace token
        id: token
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "VSCE_PAT secret is not configured; skipping Marketplace publish."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download VSIX artifact
        if: steps.token.outputs.configured == 'true'
        uses: actions/download-artifact@v4
        with:
          name: aseview-vsix
          path: dist

      - name: Publish to Visual Studio Marketplace
        if: steps.token.outputs.configured == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --packagePath dist/aseview.vsix -p "$VSCE_PAT"

  publish-openvsx:
    if: >
      (
        github.event_name == 'release' ||
        (github.event_name == 'workflow_dispatch' &&
         (github.event.inputs.target == 'openvsx' || github.event.inputs.target == 'both'))
      )
    needs: build-vsix
    runs-on: ubuntu-latest
    steps:
      - name: Check Open VSX token
        id: token
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "OVSX_PAT secret is not configured; skipping Open VSX publish."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download VSIX artifact
        if: steps.token.outputs.configured == 'true'
        uses: actions/download-artifact@v4
        with:
          name: aseview-vsix
          path: dist

      - name: Publish to Open VSX
        if: steps.token.outputs.configured == 'true'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx --yes ovsx publish dist/aseview.vsix -p "$OVSX_PAT"
