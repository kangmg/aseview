name: Publish VS Code Extension

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "both"
        type: choice
        options:
          - marketplace
          - openvsx
          - both

jobs:
  build-vsix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vscode-extension/package.json

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm install

      - name: Compile extension
        working-directory: vscode-extension
        run: npm run compile

      - name: Package VSIX
        working-directory: vscode-extension
        run: npx @vscode/vsce package --out aseview.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: aseview-vsix
          path: vscode-extension/aseview.vsix

  publish-marketplace:
    if: >
      (
        github.event_name == 'release' ||
        (github.event_name == 'workflow_dispatch' &&
         (github.event.inputs.target == 'marketplace' || github.event.inputs.target == 'both'))
      ) &&
      secrets.VSCE_PAT != ''
    needs: build-vsix
    runs-on: ubuntu-latest
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: aseview-vsix
          path: dist

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT secret is not configured."
            exit 1
          fi
          npx @vscode/vsce publish --packagePath dist/aseview.vsix -p "$VSCE_PAT"

  publish-openvsx:
    if: >
      (
        github.event_name == 'release' ||
        (github.event_name == 'workflow_dispatch' &&
         (github.event.inputs.target == 'openvsx' || github.event.inputs.target == 'both'))
      ) &&
      secrets.OVSX_PAT != ''
    needs: build-vsix
    runs-on: ubuntu-latest
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: aseview-vsix
          path: dist

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "OVSX_PAT secret is not configured."
            exit 1
          fi
          npx ovsx publish dist/aseview.vsix -p "$OVSX_PAT"
