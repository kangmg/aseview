<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASEView Lite Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/TrackballControls.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/kangmg/aseview@main/aseview/static/js/styles.js?_aseview=20260509-color-schemes-2"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #ffffff;
        }

        #viewport {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* ── top-left: play + slider + frame label ── */
        #lite-controls {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.30);
            backdrop-filter: blur(3px);
        }

        #lite-controls.hidden {
            display: none;
        }

        #play-stop-btn {
            border: none;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.45);
            color: #ffffff;
            width: 28px;
            height: 28px;
            padding: 0;
            cursor: pointer;
            user-select: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        #play-stop-btn::before {
            content: "";
            display: block;
            width: 0;
            height: 0;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: 9px solid #ffffff;
            margin-left: 2px;
        }

        #play-stop-btn.is-playing::before {
            width: 9px;
            height: 9px;
            margin-left: 0;
            border: none;
            background:
                linear-gradient(to right,
                    #ffffff 0,
                    #ffffff 3px,
                    transparent 3px,
                    transparent 6px,
                    #ffffff 6px,
                    #ffffff 9px);
        }

        #play-stop-btn:focus-visible {
            outline: none;
        }

        #frame-slider {
            width: 110px;
            accent-color: #ffffff;
            cursor: pointer;
            height: 3px;
        }

        #frame-label {
            color: rgba(255, 255, 255, 0.75);
            font-size: 11px;
            font-weight: 500;
            min-width: 44px;
            text-align: center;
            letter-spacing: 0.3px;
            user-select: none;
        }

        /* ── bottom-left: element map ── */
        #element-map {
            position: absolute;
            left: 10px;
            bottom: 10px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(3px);
            max-width: calc(100% - 20px);
            overflow-x: auto;
            white-space: nowrap;
        }

        #element-map.hidden {
            display: none;
        }

        .element-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 1px 5px;
            border-radius: 999px;
            border: none;
            font-size: 10px;
            font-weight: 600;
            color: rgba(15, 23, 42, 0.75);
            background: transparent;
        }

        .element-chip-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            border: none;
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <div id="viewport">
        <div id="lite-controls" class="hidden">
            <button id="play-stop-btn" type="button" title="Play" aria-label="Play"></button>
            <input id="frame-slider" type="range" min="0" max="0" step="1" value="0" title="Frame">
            <span id="frame-label">0 / 0</span>
        </div>
        <div id="element-map" class="hidden"></div>
    </div>

    <script>
        const molecularData = {{molecular_data}};
        const settings = {{settings}};

        const styleKey = String(settings.style || "cinematic").toLowerCase();
        const fps = Number(settings.fps) > 0 ? Number(settings.fps) : 30;
        const backgroundColor = settings.backgroundColor || "#ffffff";
        const atomSize = Number(settings.atomSize) || 0.4;
        const bondThreshold = Number(settings.bondThreshold) || 1.3;
        const bondThickness = Number(settings.bondThickness) || 0.09;
        const hideHydrogens = !!settings.hideHydrogens;
        const showCell = settings.showCell !== false;
        const isDarkBackground = String(backgroundColor).toLowerCase() === "#000000";

        if (typeof atomColorScheme !== "undefined") {
            atomColorScheme = String(settings.colorScheme || "Jmol").toLowerCase();
        }

        if (typeof toLinearColor !== "function") {
            window.toLinearColor = function(color) {
                const result = color instanceof THREE.Color ? color.clone() : new THREE.Color(color);
                if (typeof result.convertSRGBToLinear === "function") {
                    result.convertSRGBToLinear();
                }
                return result;
            };
        }
        if (typeof setMaterialColor !== "function") {
            window.setMaterialColor = function(material, color) {
                if (material && material.color) {
                    material.color.copy(toLinearColor(color));
                }
                if (material && material.uniforms && material.uniforms.uColor && material.uniforms.uColor.value) {
                    material.uniforms.uColor.value.copy(toLinearColor(color));
                }
            };
        }

        const atomFactories = {
            "default": (pos, symbol, scale, helpers) => createAtomStyleDefault(pos, symbol, scale, helpers),
            "2d": (pos, symbol, scale) => createAtomStyle2D(pos, symbol, scale),
            "cartoon": (pos, symbol, scale, helpers) => createAtomStyleCartoon(pos, symbol, scale, helpers),
            "neon": (pos, symbol, scale) => createAtomStyleNeon(pos, symbol, scale),
            "glossy": (pos, symbol, scale, helpers) => createAtomStyleGlossy(pos, symbol, scale, helpers),
            "metallic": (pos, symbol, scale, helpers) => createAtomStyleMetallic(pos, symbol, scale, helpers),
            "cinematic": (pos, symbol, scale, helpers) => createAtomStyleCinematic(pos, symbol, scale, helpers),
            "rowan": (pos, symbol, scale, helpers) => createAtomStyleRowan(pos, symbol, scale, helpers),
            "bubble": (pos, symbol, scale) => createAtomStyleBubble(pos, symbol, scale),
            "grey": (pos, symbol, scale) => createAtomStyleGrey(pos, symbol, scale, 0x808080),
        };

        const bondFactories = {
            "default": (p1, p2, s1, s2, br, as, helpers) => createBondStyleDefault(p1, p2, s1, s2, br, as, "default", helpers),
            "2d": (p1, p2, s1, s2, br, as, helpers) => createBondStyle2D(p1, p2, s1, s2, br, as, helpers),
            "cartoon": (p1, p2, s1, s2, br, as, helpers) => createBondStyleCartoon(p1, p2, s1, s2, br, as, helpers),
            "neon": (p1, p2, s1, s2, br, as, helpers) => createBondStyleNeon(p1, p2, s1, s2, br, as, helpers),
            "glossy": (p1, p2, s1, s2, br, as, helpers) => createBondStyleDefault(p1, p2, s1, s2, br, as, "glossy", helpers),
            "metallic": (p1, p2, s1, s2, br, as, helpers) => createBondStyleDefault(p1, p2, s1, s2, br, as, "metallic", helpers),
            "cinematic": (p1, p2, s1, s2, br, as, helpers) => createBondStyleCinematic(p1, p2, s1, s2, br, as, helpers),
            "rowan": (p1, p2, s1, s2, br, as, helpers) => createBondStyleRowan(p1, p2, s1, s2, br, as, helpers),
            "bubble": (p1, p2, s1, s2, br, as, helpers) => createBondStyleBubble(p1, p2, s1, s2, br, as, helpers),
            "grey": (p1, p2, s1, s2, br, as, helpers) => createBondStyleGrey(p1, p2, s1, s2, br, as, {}, helpers),
        };

        const viewport = document.getElementById("viewport");
        const controlsPanel = document.getElementById("lite-controls");
        const playStopButton = document.getElementById("play-stop-btn");
        const frameSlider = document.getElementById("frame-slider");
        const frameLabel = document.getElementById("frame-label");
        const elementMap = document.getElementById("element-map");
        const frameCount = Array.isArray(molecularData) ? molecularData.length : 0;
        document.body.style.backgroundColor = backgroundColor;
        viewport.style.backgroundColor = backgroundColor;

        if (isDarkBackground) {
            controlsPanel.style.background = "rgba(0, 0, 0, 0.35)";
            elementMap.style.background = "rgba(0, 0, 0, 0.35)";
        }

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(backgroundColor);

        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 2000);
        camera.position.set(0, 0, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true });
        renderer.setPixelRatio(window.devicePixelRatio || 1);
        renderer.setSize(viewport.clientWidth, viewport.clientHeight);
        viewport.appendChild(renderer.domElement);

        const controls = new THREE.TrackballControls(camera, renderer.domElement);
        controls.rotateSpeed = 4.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.dynamicDampingFactor = 0.2;
        controls.minDistance = 0.2;

        scene.add(new THREE.AmbientLight(0xffffff, 0.85));
        const keyLight = new THREE.DirectionalLight(0xffffff, 0.8);
        keyLight.position.set(4, 5, 8);
        scene.add(keyLight);
        const fillLight = new THREE.DirectionalLight(0xffffff, 0.35);
        fillLight.position.set(-6, -2, -6);
        scene.add(fillLight);

        const moleculeGroup = new THREE.Group();
        scene.add(moleculeGroup);
        const cellGroup = new THREE.Group();
        scene.add(cellGroup);

        let currentFrame = 0;
        let isPlaying = false;
        let playbackTimer = null;

        function updateFrameLabel() {
            if (frameLabel && frameCount > 0) {
                frameLabel.textContent = (currentFrame + 1) + " / " + frameCount;
            }
        }

        function disposeObject(obj) {
            if (!obj) return;
            if (obj.geometry && typeof obj.geometry.dispose === "function") {
                obj.geometry.dispose();
            }
            if (obj.material) {
                if (Array.isArray(obj.material)) {
                    obj.material.forEach((mat) => {
                        if (mat && typeof mat.dispose === "function" && !mat._isCached) mat.dispose();
                    });
                } else if (typeof obj.material.dispose === "function" && !obj.material._isCached) {
                    obj.material.dispose();
                }
            }
            if (obj.children && obj.children.length > 0) {
                obj.children.forEach((child) => disposeObject(child));
            }
        }

        function clearGroup(group) {
            while (group.children.length > 0) {
                const child = group.children.pop();
                disposeObject(child);
            }
        }

        function clearSceneObjects() {
            clearGroup(moleculeGroup);
            clearGroup(cellGroup);
        }

        function getVisibleFrame(frame) {
            const symbols = Array.isArray(frame?.symbols) ? frame.symbols : [];
            const positions = Array.isArray(frame?.positions) ? frame.positions : [];
            const filteredSymbols = [];
            const filteredPositions = [];

            for (let i = 0; i < symbols.length; i++) {
                const symbol = symbols[i];
                const pos = positions[i];
                if (!Array.isArray(pos) || pos.length < 3) continue;
                if (hideHydrogens && symbol === "H") continue;
                filteredSymbols.push(symbol);
                filteredPositions.push(new THREE.Vector3(pos[0], pos[1], pos[2]));
            }

            return { symbols: filteredSymbols, positions: filteredPositions };
        }

        function updateElementMap(symbols) {
            if (!elementMap) return;
            const uniqueSymbols = [...new Set(symbols || [])];
            elementMap.innerHTML = "";
            if (uniqueSymbols.length === 0) {
                elementMap.classList.add("hidden");
                return;
            }

            uniqueSymbols.forEach((symbol) => {
                const chip = document.createElement("span");
                chip.className = "element-chip";
                if (isDarkBackground) {
                    chip.style.color = "rgba(248, 250, 252, 0.80)";
                }

                const dot = document.createElement("span");
                dot.className = "element-chip-dot";
                const colorHex = `#${(getAtomColorByScheme(symbol) >>> 0).toString(16).padStart(6, "0")}`;
                dot.style.backgroundColor = colorHex;

                const label = document.createElement("span");
                label.textContent = symbol;

                chip.appendChild(dot);
                chip.appendChild(label);
                elementMap.appendChild(chip);
            });

            elementMap.classList.remove("hidden");
        }

        function renderCell(frame) {
            if (!showCell || !frame || !Array.isArray(frame.cell) || frame.cell.length !== 3) {
                return [];
            }

            const vectors = frame.cell.map((v) => Array.isArray(v) && v.length >= 3 ? new THREE.Vector3(v[0], v[1], v[2]) : null);
            if (vectors.some((v) => v === null)) {
                return [];
            }

            const [a, b, c] = vectors;
            const o = new THREE.Vector3(0, 0, 0);
            const ab = a.clone().add(b);
            const ac = a.clone().add(c);
            const bc = b.clone().add(c);
            const abc = a.clone().add(b).add(c);
            const corners = [o, a, b, c, ab, ac, bc, abc];
            const edgePairs = [
                [0, 1], [0, 2], [0, 3],
                [1, 4], [1, 5],
                [2, 4], [2, 6],
                [3, 5], [3, 6],
                [4, 7], [5, 7], [6, 7],
            ];

            const edgePoints = [];
            edgePairs.forEach(([start, end]) => {
                edgePoints.push(corners[start], corners[end]);
            });
            const geometry = new THREE.BufferGeometry().setFromPoints(edgePoints);
            const material = new THREE.LineBasicMaterial({
                color: isDarkBackground ? 0xcbd5e1 : 0x1e293b,
                transparent: true,
                opacity: isDarkBackground ? 0.9 : 0.75,
            });
            cellGroup.add(new THREE.LineSegments(geometry, material));
            return corners;
        }

        function fitCamera(points) {
            if (!points || points.length === 0) return;
            const box = new THREE.Box3().setFromPoints(points);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z, 0.5);
            const half = maxDim * 0.6;

            const aspect = Math.max(viewport.clientWidth / Math.max(viewport.clientHeight, 1), 1);
            camera.left = -half * aspect;
            camera.right = half * aspect;
            camera.top = half;
            camera.bottom = -half;
            camera.near = 0.1;
            camera.far = maxDim * 20;

            controls.target.copy(center);
            camera.position.set(center.x, center.y, center.z + maxDim * 3);
            camera.updateProjectionMatrix();
            controls.update();
        }

        function renderFrame(frameIndex, fitView = false) {
            if (!Array.isArray(molecularData) || molecularData.length === 0) {
                clearSceneObjects();
                updateElementMap([]);
                updateFrameLabel();
                return;
            }
            const total = molecularData.length;
            currentFrame = ((frameIndex % total) + total) % total;
            const frame = molecularData[currentFrame];
            const visible = getVisibleFrame(frame);

            clearSceneObjects();

            const helpers = { radiusScaleBySymbol: {}, highlightAtoms: null, highlightColor: 0xffffff };
            const atomFactory = atomFactories[styleKey] || atomFactories.default;
            const bondFactory = bondFactories[styleKey] || bondFactories.default;

            if (visible.symbols.length > 0) {
                for (let i = 0; i < visible.symbols.length; i++) {
                    const atomMesh = atomFactory(visible.positions[i], visible.symbols[i], atomSize, helpers);
                    if (atomMesh) moleculeGroup.add(atomMesh);
                }

                const bondPairs = findBondsSpatialGrid(visible.positions, visible.symbols, bondThreshold);
                for (const pair of bondPairs) {
                    const bond = bondFactory(
                        visible.positions[pair.i],
                        visible.positions[pair.j],
                        visible.symbols[pair.i],
                        visible.symbols[pair.j],
                        bondThickness,
                        atomSize,
                        helpers
                    );
                    if (bond) moleculeGroup.add(bond);
                }
            }

            const cellCorners = renderCell(frame);
            updateElementMap(visible.symbols);

            if (fitView) {
                const fitPoints = [...visible.positions, ...cellCorners];
                if (fitPoints.length > 0) {
                    fitCamera(fitPoints);
                }
            }
            if (frameSlider) {
                frameSlider.value = String(currentFrame);
            }
            updateFrameLabel();
        }

        function syncPlayButton() {
            if (isPlaying) {
                playStopButton.classList.add("is-playing");
                playStopButton.title = "Stop";
                playStopButton.setAttribute("aria-label", "Stop");
            } else {
                playStopButton.classList.remove("is-playing");
                playStopButton.title = "Play";
                playStopButton.setAttribute("aria-label", "Play");
            }
        }

        function stopPlayback() {
            if (playbackTimer !== null) {
                clearInterval(playbackTimer);
                playbackTimer = null;
            }
            isPlaying = false;
            syncPlayButton();
        }

        function startPlayback() {
            if (!Array.isArray(molecularData) || molecularData.length <= 1) return;
            stopPlayback();
            isPlaying = true;
            syncPlayButton();
            playbackTimer = setInterval(() => {
                currentFrame = (currentFrame + 1) % molecularData.length;
                renderFrame(currentFrame, false);
            }, 1000 / fps);
        }

        function togglePlayback() {
            if (isPlaying) {
                stopPlayback();
            } else {
                startPlayback();
            }
        }

        function onResize() {
            const width = Math.max(viewport.clientWidth, 1);
            const height = Math.max(viewport.clientHeight, 1);
            renderer.setSize(width, height);
            const aspect = width / height;
            camera.left = -camera.top * aspect;
            camera.right = camera.top * aspect;
            camera.updateProjectionMatrix();
            controls.handleResize();
        }

        playStopButton.addEventListener("click", togglePlayback);
        frameSlider.addEventListener("input", (event) => {
            const next = Number.parseInt(event.target.value, 10);
            if (!Number.isFinite(next)) return;
            currentFrame = next;
            renderFrame(currentFrame, false);
        });
        window.addEventListener("resize", onResize);

        if (frameCount > 1) {
            controlsPanel.classList.remove("hidden");
            frameSlider.max = String(frameCount - 1);
            frameSlider.value = "0";
        }
        syncPlayButton();
        updateFrameLabel();

        renderFrame(0, true);

        (function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        })();
    </script>
</body>

</html>
