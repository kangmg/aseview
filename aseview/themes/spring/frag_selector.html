            selectedCopyFormat = COPY_FORMAT_ORDER[(currentIndex + 1) % COPY_FORMAT_ORDER.length];
            updateCopyFormatChip();
        }

        function formatFloat(value, precision = 10) {
            const number = Number(value);
            return Number.isFinite(number) ? number.toFixed(precision) : (0).toFixed(precision);
        }

        function formatBool(value) {
            return value ? 'T' : 'F';
        }

        function isValidMoleculeFrame(molecule) {
            return !!(
                molecule &&
                Array.isArray(molecule.symbols) &&
                Array.isArray(molecule.positions) &&
                molecule.symbols.length === molecule.positions.length
            );
        }

        function getFrameEntries() {
            return isValidMoleculeFrame(molData) ? [{ molecule: molData, frameIndex: 0 }] : [];
        }

        function getFixedIndexSet(molecule) {
            const fixed = new Set();

            if (Array.isArray(molecule.fixed)) {
                molecule.fixed.forEach(index => {
                    const atomIndex = Number(index);
                    if (Number.isInteger(atomIndex) && atomIndex >= 0) fixed.add(atomIndex);
                });
            }

            if (molecule.arrays && Array.isArray(molecule.arrays.fixed)) {
                molecule.arrays.fixed.forEach((value, index) => {
                    if (value) fixed.add(index);
                });
            }

            return fixed;
        }

        function normalizeMoveMaskValue(value) {
            if (Array.isArray(value) && value.length >= 3) {
                return value.slice(0, 3).map(Boolean);
            }
            if (typeof value === 'boolean') {
                return [value, value, value];
            }
            return null;
        }

        function getAtomMoveMask(molecule, index, fixedSet) {
            if (fixedSet.has(index)) return [false, false, false];

            const arrays = molecule.arrays || {};
            if (Array.isArray(arrays.move_mask) && arrays.move_mask.length > index) {
                const mask = normalizeMoveMaskValue(arrays.move_mask[index]);
                if (mask) return mask;
            }

            return [true, true, true];
        }

        function getMoveMaskInfo(molecule) {
            const fixedSet = getFixedIndexSet(molecule);
            const masks = [];
            let hasConstraint = false;
            let hasPartial = false;

            for (let i = 0; i < molecule.symbols.length; i++) {
                const mask = getAtomMoveMask(molecule, i, fixedSet);
                masks.push(mask);
                if (!mask.every(Boolean)) hasConstraint = true;
                if (!(mask.every(Boolean) || mask.every(value => !value))) hasPartial = true;
            }

            return { masks, hasConstraint, hasPartial };
        }

        function determinant3(cell) {
            return (
                cell[0][0] * (cell[1][1] * cell[2][2] - cell[1][2] * cell[2][1]) -
                cell[0][1] * (cell[1][0] * cell[2][2] - cell[1][2] * cell[2][0]) +
                cell[0][2] * (cell[1][0] * cell[2][1] - cell[1][1] * cell[2][0])
            );
        }

        function getValidCell(molecule) {
            if (!molecule || !Array.isArray(molecule.cell) || molecule.cell.length < 3) return null;

            const cell = molecule.cell.slice(0, 3).map(vector => {
                if (!Array.isArray(vector) || vector.length < 3) return null;
                return vector.slice(0, 3).map(Number);
            });

            if (cell.some(vector => !vector || vector.some(value => !Number.isFinite(value)))) return null;
            if (Math.abs(determinant3(cell)) < 1e-10) return null;
            return cell;
        }

        function getPbcFlags(molecule, hasCell) {
            if (Array.isArray(molecule.pbc)) {
                return [0, 1, 2].map(index => !!molecule.pbc[index]);
            }
            return hasCell ? [true, true, true] : [false, false, false];
        }

        function vectorLength(vector) {
            return Math.sqrt(vector.reduce((sum, value) => sum + value * value, 0));
        }

        function dot(a, b) {
            return a[0] * b[0] + a[1] * b[1] + a[2] * b[2];
        }

        function angleDegrees(a, b) {
            const denominator = vectorLength(a) * vectorLength(b);
            if (denominator <= 1e-12) return 90;
            const cosine = Math.max(-1, Math.min(1, dot(a, b) / denominator));
            return Math.acos(cosine) * 180 / Math.PI;
        }

        function getCellParameters(cell) {
            const a = cell[0];
            const b = cell[1];
            const c = cell[2];
            return [
                vectorLength(a),
                vectorLength(b),
                vectorLength(c),
                angleDegrees(b, c),
                angleDegrees(a, c),
                angleDegrees(a, b)
            ];
        }

        function invert3(cell) {
            const det = determinant3(cell);
            if (Math.abs(det) < 1e-10) return null;
            return [
                [
                    (cell[1][1] * cell[2][2] - cell[1][2] * cell[2][1]) / det,
                    (cell[0][2] * cell[2][1] - cell[0][1] * cell[2][2]) / det,
                    (cell[0][1] * cell[1][2] - cell[0][2] * cell[1][1]) / det
                ],
                [
                    (cell[1][2] * cell[2][0] - cell[1][0] * cell[2][2]) / det,
                    (cell[0][0] * cell[2][2] - cell[0][2] * cell[2][0]) / det,
                    (cell[0][2] * cell[1][0] - cell[0][0] * cell[1][2]) / det
                ],
                [
                    (cell[1][0] * cell[2][1] - cell[1][1] * cell[2][0]) / det,
                    (cell[0][1] * cell[2][0] - cell[0][0] * cell[2][1]) / det,
                    (cell[0][0] * cell[1][1] - cell[0][1] * cell[1][0]) / det
                ]
            ];
        }

        function multiplyRowVectorMatrix(vector, matrix) {
            return [
                vector[0] * matrix[0][0] + vector[1] * matrix[1][0] + vector[2] * matrix[2][0],
                vector[0] * matrix[0][1] + vector[1] * matrix[1][1] + vector[2] * matrix[2][1],
                vector[0] * matrix[0][2] + vector[1] * matrix[1][2] + vector[2] * matrix[2][2]
            ];
        }

        function wrapFractional(value) {
            const wrapped = value - Math.floor(value);
            return Math.abs(wrapped - 1) < 1e-10 ? 0 : wrapped;
        }

        function countSymbols(symbols) {
            const counts = {};
            symbols.forEach(symbol => {
                counts[symbol] = (counts[symbol] || 0) + 1;
            });
            return counts;
        }

        function getFormulaSum(symbols) {
            const counts = countSymbols(symbols);
            return Object.keys(counts).sort().map(symbol => `${symbol}${counts[symbol]}`).join(' ');
        }

        function getAtomLabels(symbols) {
            const counts = {};
            return symbols.map(symbol => {
                counts[symbol] = (counts[symbol] || 0) + 1;
                return `${symbol}${counts[symbol]}`;
            });
        }

        function getElementGroups(symbols) {
            const order = [];
            const groups = {};
            symbols.forEach((symbol, index) => {
                if (!groups[symbol]) {
                    groups[symbol] = [];
                    order.push(symbol);
                }
                groups[symbol].push(index);
            });
            return order.map(symbol => ({ symbol, indices: groups[symbol] }));
        }

        function getFrameTitle(molecule, frameIndex) {
            const name = molecule && molecule.name ? String(molecule.name).trim() : '';
            return (name || `aseview frame ${frameIndex + 1}`).replace(/\s+/g, ' ').slice(0, 80);
        }

        function serializeFrameAsXYZ(molecule, frameIndex) {
            const lines = [String(molecule.symbols.length)];
            let comment = `Frame ${frameIndex + 1}`;
            if (molecule.energy !== undefined) {
                comment += ` Energy: ${molecule.energy}`;
            }
            lines.push(comment);

            for (let i = 0; i < molecule.symbols.length; i++) {
                const position = molecule.positions[i];
                lines.push(`${molecule.symbols[i]}  ${formatFloat(position[0], 6)}  ${formatFloat(position[1], 6)}  ${formatFloat(position[2], 6)}`);
            }

            return lines.join('\n') + '\n';
        }

        function serializeFrameAsExtXYZ(molecule, frameIndex) {
            const moveMaskInfo = getMoveMaskInfo(molecule);
            const cell = getValidCell(molecule);
            const pbc = getPbcFlags(molecule, !!cell);
            let properties = 'species:S:1:pos:R:3';
            if (moveMaskInfo.hasConstraint) {
                properties += moveMaskInfo.hasPartial ? ':move_mask:L:3' : ':move_mask:L:1';
            }

            const header = [];
            if (cell) {
                header.push(`Lattice="${cell.flat().map(value => formatFloat(value, 10)).join(' ')}"`);
            }
            header.push(`Properties=${properties}`);
            if (cell) {
                header.push(`pbc="${pbc.map(formatBool).join(' ')}"`);
            }
            header.push(`frame=${frameIndex + 1}`);
            if (molecule.energy !== undefined && Number.isFinite(Number(molecule.energy))) {
                header.push(`energy=${formatFloat(molecule.energy, 12)}`);
            }

            const lines = [String(molecule.symbols.length), header.join(' ')];
            for (let i = 0; i < molecule.symbols.length; i++) {
                const position = molecule.positions[i];
                let line = `${molecule.symbols[i]}  ${formatFloat(position[0], 8)}  ${formatFloat(position[1], 8)}  ${formatFloat(position[2], 8)}`;
                if (moveMaskInfo.hasConstraint) {
                    const mask = moveMaskInfo.masks[i];
                    line += moveMaskInfo.hasPartial
                        ? `  ${mask.map(formatBool).join('  ')}`
                        : `  ${formatBool(mask.every(Boolean))}`;
                }
                lines.push(line);
            }

            return lines.join('\n') + '\n';
        }

        function serializeFrameAsCIF(molecule, frameIndex) {
            const cell = getValidCell(molecule);
            const labels = getAtomLabels(molecule.symbols);
            const lines = [
                `data_frame_${frameIndex + 1}`,
                `_chemical_formula_sum              "${getFormulaSum(molecule.symbols)}"`
            ];

            if (cell) {
                const [a, b, c, alpha, beta, gamma] = getCellParameters(cell);
                lines.push(
                    `_cell_length_a       ${formatFloat(a, 12)}`,
                    `_cell_length_b       ${formatFloat(b, 12)}`,
                    `_cell_length_c       ${formatFloat(c, 12)}`,
                    `_cell_angle_alpha    ${formatFloat(alpha, 12)}`,
                    `_cell_angle_beta     ${formatFloat(beta, 12)}`,
                    `_cell_angle_gamma    ${formatFloat(gamma, 12)}`,
                    '',
                    `_space_group_name_H-M_alt    "P 1"`,
                    `_space_group_IT_number       1`,
                    '',
                    'loop_',
                    '  _space_group_symop_operation_xyz',
                    "  'x, y, z'",
                    '',
                    'loop_',
                    '  _atom_site_type_symbol',
                    '  _atom_site_label',
                    '  _atom_site_symmetry_multiplicity',
                    '  _atom_site_fract_x',
                    '  _atom_site_fract_y',
                    '  _atom_site_fract_z',
                    '  _atom_site_occupancy'
                );

                const inverse = invert3(cell);
                for (let i = 0; i < molecule.symbols.length; i++) {
                    const scaled = multiplyRowVectorMatrix(molecule.positions[i].map(Number), inverse).map(wrapFractional);
                    lines.push(`  ${molecule.symbols[i]}   ${labels[i]}        1.0  ${formatFloat(scaled[0], 12)}  ${formatFloat(scaled[1], 12)}  ${formatFloat(scaled[2], 12)}  1.0000`);
                }
            } else {
                lines.push(
                    'loop_',
                    '  _atom_site_type_symbol',
                    '  _atom_site_label',
                    '  _atom_site_symmetry_multiplicity',
                    '  _atom_site_Cartn_x',
                    '  _atom_site_Cartn_y',
                    '  _atom_site_Cartn_z',
                    '  _atom_site_occupancy'
                );

                for (let i = 0; i < molecule.symbols.length; i++) {
                    const position = molecule.positions[i];
                    lines.push(`  ${molecule.symbols[i]}   ${labels[i]}        1.0  ${formatFloat(position[0], 12)}  ${formatFloat(position[1], 12)}  ${formatFloat(position[2], 12)}  1.0000`);
                }
            }

            return lines.join('\n') + '\n';
        }

        function serializeFrameAsVaspPoscar(molecule, frameIndex) {
            const cell = getValidCell(molecule);
            if (!cell) {
                throw new Error('VASP POSCAR copy requires unit cell data.');
            }

            const moveMaskInfo = getMoveMaskInfo(molecule);
            const groups = getElementGroups(molecule.symbols);
            const lines = [
                getFrameTitle(molecule, frameIndex),
                '1.0000000000000000'
            ];

            cell.forEach(vector => {
                lines.push(`  ${vector.map(value => formatFloat(value, 16).padStart(22)).join('  ')}`);
            });
            lines.push(`  ${groups.map(group => group.symbol).join('  ')}`);
            lines.push(`  ${groups.map(group => group.indices.length).join('  ')}`);
            if (moveMaskInfo.hasConstraint) {
                lines.push('Selective dynamics');
            }
            lines.push('Cartesian');

            groups.forEach(group => {
                group.indices.forEach(index => {
                    const position = molecule.positions[index];
                    let line = `  ${position.map(value => formatFloat(value, 16).padStart(22)).join('  ')}`;
                    if (moveMaskInfo.hasConstraint) {
                        line += `   ${moveMaskInfo.masks[index].map(formatBool).join('   ')}`;
                    }
                    lines.push(line);
                });
            });

            return lines.join('\n') + '\n';
        }

        function serializeCopyPayloadFromEntries(entries, format) {
            if (!entries || entries.length === 0) return { text: '', frameCount: 0 };

            let text = '';
            entries.forEach(({ molecule, frameIndex }, outputIndex) => {
                if (format === 'xyz') {
                    text += serializeFrameAsXYZ(molecule, frameIndex);
                } else if (format === 'extxyz') {
                    text += serializeFrameAsExtXYZ(molecule, frameIndex);
                } else if (format === 'cif') {
                    text += serializeFrameAsCIF(molecule, frameIndex);
                } else if (format === 'vasp-poscar') {
                    text += serializeFrameAsVaspPoscar(molecule, frameIndex);
                } else {
                    throw new Error(`Unsupported copy format: ${format}`);
                }

                if (format !== 'xyz' && format !== 'extxyz' && outputIndex < entries.length - 1) {
                    text += '\n';
                }
            });

            return { text, frameCount: entries.length };
        }

        function cloneMoleculeForIndices(source, indices, label) {
            const molecule = {
                symbols: indices.map(index => source.symbols[index]),
                positions: indices.map(index => source.positions[index]),
                name: label
            };

            if (source.cell) molecule.cell = source.cell;
            if (source.pbc) molecule.pbc = source.pbc;

            const sourceMaskInfo = getMoveMaskInfo(source);
            if (sourceMaskInfo.hasConstraint) {
                const fixed = [];
                const moveMask = [];
                let hasPartial = false;
                indices.forEach((sourceIndex, newIndex) => {
                    const mask = sourceMaskInfo.masks[sourceIndex] || [true, true, true];
                    moveMask.push(mask);
                    if (mask.every(value => !value)) fixed.push(newIndex);
                    if (!(mask.every(Boolean) || mask.every(value => !value))) hasPartial = true;
                });
                if (fixed.length > 0) molecule.fixed = fixed;
                if (hasPartial) molecule.arrays = { move_mask: moveMask };
            }

            return molecule;
        }

        function getFragmentIndexGroups() {
            if (!molData || !Array.isArray(molData.symbols)) return { selected: [], unselected: [] };
            const n = molData.symbols.length;
            return {
                selected: Array.from({ length: n }, (_, i) => i).filter(i => selectedAtoms.has(i)),
                unselected: Array.from({ length: n }, (_, i) => i).filter(i => !selectedAtoms.has(i))
            };
        }

        function buildXyzByFrag() {
            if (!molData) return '';
            const groups = getFragmentIndexGroups();
            const entries = [];
            if (groups.selected.length > 0) {
                entries.push({ molecule: cloneMoleculeForIndices(molData, groups.selected, 'selected'), frameIndex: 0 });
            }
            if (groups.unselected.length > 0) {
                entries.push({ molecule: cloneMoleculeForIndices(molData, groups.unselected, 'unselected'), frameIndex: entries.length });
            }
            return serializeCopyPayloadFromEntries(entries, getSelectedCopyFormat()).text;
        }

        function buildXyzReindexed() {
            if (!molData) return '';
            const groups = getFragmentIndexGroups();
            const orderedAtoms = [...groups.selected, ...groups.unselected];
            const molecule = cloneMoleculeForIndices(molData, orderedAtoms, `Frags= [0:${groups.selected.length}, ${groups.selected.length}:${orderedAtoms.length}]`);
            return serializeCopyPayloadFromEntries([{ molecule, frameIndex: 0 }], getSelectedCopyFormat()).text;
        }


        // ═════════════════════════════════════════════════════════════════════
        // ── SVG / 2D interaction (mode-aware) ────────────────────────────────
        // ═════════════════════════════════════════════════════════════════════

        function initSVGInteraction() {
            const svg = document.getElementById('lewis-svg');
            if (!svg) return;

            // Pan state
            let panning  = false;
            let panSX = 0, panSY = 0, panTX0 = 0, panTY0 = 0;

            // Rotate state
            let rotating = false;
            let rotComX = 0, rotComY = 0, rotStartAngle = 0, rotAngle0 = 0;

            // Selection drag state
            let selDragging  = false;
            let selStartX    = 0, selStartY = 0;
            let lassoClientPts = [];

            // ── Scroll zoom (active in all modes) ────────────────────────────
            svg.addEventListener('wheel', e => {
                e.preventDefault();
                const factor = e.deltaY > 0 ? 0.88 : 1 / 0.88;
                const rect   = svg.getBoundingClientRect();
                const mx     = e.clientX - rect.left;
                const my     = e.clientY - rect.top;
                svgTx = mx - (mx - svgTx) * factor;
                svgTy = my - (my - svgTy) * factor;
                svgScale *= factor;
                applySVGTransform();
            }, { passive: false });

            // ── Double-click: fit view ────────────────────────────────────────
            svg.addEventListener('dblclick', e => {
                if (!e.target.closest('.atom-group')) fitSVG();
            });

            // ── Mouse down ───────────────────────────────────────────────────
            svg.addEventListener('mousedown', e => {
                if (e.button !== 0) return;
                e.preventDefault();

                if (currentMode === 'navigate') {
                    const onMolecule = !!e.target.closest('.atom-group, .bond-seg');
                    if (onMolecule) {
                        panning = true;
                        panSX  = e.clientX; panSY = e.clientY;
                        panTX0 = svgTx;     panTY0 = svgTy;
                        svg.classList.add('panning');
                    } else {
                        rotating = true;
                        const svgRect = svg.getBoundingClientRect();
                        // COM screen position (SVG viewport coords, stable during drag)
                        rotComX = svgComX * svgScale + svgTx;
                        rotComY = svgComY * svgScale + svgTy;
                        const mx = e.clientX - svgRect.left;
                        const my = e.clientY - svgRect.top;
                        rotStartAngle = Math.atan2(my - rotComY, mx - rotComX);
                        rotAngle0 = svgAngle;
                        svg.classList.add('rotating');
                    }

                } else if (currentMode === 'rect') {
                    selDragging = true;
                    selStartX   = e.clientX;
                    selStartY   = e.clientY;
                    updateSelRectOverlay(selStartX, selStartY, selStartX, selStartY);

                } else if (currentMode === 'lasso') {
                    selDragging    = true;
                    lassoClientPts = [[e.clientX, e.clientY]];
                    updateLassoOverlay(lassoClientPts);
                }
                // 'click' mode: atom groups handle their own click events
            });

            // ── Mouse move ───────────────────────────────────────────────────
            window.addEventListener('mousemove', e => {
                if (panning && currentMode === 'navigate') {
                    svgTx = panTX0 + (e.clientX - panSX);
                    svgTy = panTY0 + (e.clientY - panSY);
                    applySVGTransform();

                } else if (rotating && currentMode === 'navigate') {
                    const svgRect = svg.getBoundingClientRect();
                    const mx = e.clientX - svgRect.left;
                    const my = e.clientY - svgRect.top;
                    const curAngle = Math.atan2(my - rotComY, mx - rotComX);
                    svgAngle = rotAngle0 + (curAngle - rotStartAngle) * 180 / Math.PI;
                    applySVGTransform();

                } else if (selDragging && currentMode === 'rect') {
                    updateSelRectOverlay(selStartX, selStartY, e.clientX, e.clientY);

                } else if (selDragging && currentMode === 'lasso') {
                    lassoClientPts.push([e.clientX, e.clientY]);
                    if (lassoClientPts.length % 3 === 0)   // throttle overlay updates
                        updateLassoOverlay(lassoClientPts);
                }
            });

            // ── Mouse up ────────────────────────────────────────────────────
            window.addEventListener('mouseup', e => {
                if (panning) {
                    panning = false;
                    svg.classList.remove('panning');
                }
                if (rotating) {
                    rotating = false;
                    svg.classList.remove('rotating');
                }

                if (selDragging) {
                    selDragging = false;
                    const additive = e.shiftKey;

                    if (currentMode === 'rect') {
                        const dx = e.clientX - selStartX;
                        const dy = e.clientY - selStartY;
                        if (Math.hypot(dx, dy) > 4) {
                            applyAreaSelection('rect',
                                [svgToLayout(selStartX, selStartY),
                                 svgToLayout(e.clientX,  e.clientY)],
                                additive);
                        }

                    } else if (currentMode === 'lasso') {
                        if (lassoClientPts.length > 4) {
                            applyAreaSelection('lasso',
                                lassoClientPts.map(([cx, cy]) => svgToLayout(cx, cy)),
                                additive);
                        }
                        lassoClientPts = [];
                    }
                    hideSelOverlay();
                }
            });

            // ── Keyboard shortcuts ───────────────────────────────────────────
            window.addEventListener('keydown', e => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                if (e.key === 'n' || e.key === 'N') setMode('navigate');
                if (e.key === 'c' || e.key === 'C') setMode('click');
                if (e.key === 'r' || e.key === 'R') setMode('rect');
                if (e.key === 'l' || e.key === 'L') setMode('lasso');
                if (e.key === 'Escape') { hideSelOverlay(); selDragging = false; }
            });
        }

        // ═════════════════════════════════════════════════════════════════════
        // ── 3D rendering ─────────────────────────────────────────────────────
        // ═════════════════════════════════════════════════════════════════════

        function setupAxisHelper3D() {
            axisScene3D = new THREE.Scene();
            axisScene3D.background = null;

            const axisViewSize = 100;
            axisCamera3D = new THREE.OrthographicCamera(-axisViewSize, axisViewSize, axisViewSize, -axisViewSize, -200, 200);
            axisCamera3D.position.set(0, 0, 100);

            axisGroup3D = new THREE.Group();

            const colors = { x: 0xff4444, y: 0x44cc44, z: 0x4488ff };
            const axisLength = 50;
            const arrowHeadLength = 12;
            const arrowHeadWidth = 6;
            const origin = new THREE.Vector3(0, 0, 0);

            const xArrow = new THREE.ArrowHelper(new THREE.Vector3(1, 0, 0), origin, axisLength, colors.x, arrowHeadLength, arrowHeadWidth);
            const yArrow = new THREE.ArrowHelper(new THREE.Vector3(0, 1, 0), origin, axisLength, colors.y, arrowHeadLength, arrowHeadWidth);
            const zArrow = new THREE.ArrowHelper(new THREE.Vector3(0, 0, 1), origin, axisLength, colors.z, arrowHeadLength, arrowHeadWidth);
            xArrow.line.material.linewidth = 2;
            yArrow.line.material.linewidth = 2;
            zArrow.line.material.linewidth = 2;
            axisGroup3D.add(xArrow); axisGroup3D.add(yArrow); axisGroup3D.add(zArrow);

            const createTextSprite = (text, color) => {
                const canvas = document.createElement('canvas');
                canvas.width = 64; canvas.height = 64;
                const ctx = canvas.getContext('2d');
                ctx.font = 'bold 48px Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
                ctx.fillText(text, 32, 32);
                const texture = new THREE.CanvasTexture(canvas);
                const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
                const sprite = new THREE.Sprite(material);
                sprite.scale.set(14, 14, 1);
                return sprite;
            };

            const xLabel = createTextSprite('X', colors.x);
            const yLabel = createTextSprite('Y', colors.y);
            const zLabel = createTextSprite('Z', colors.z);
            xLabel.position.set(axisLength + 10, 0, 0);
            yLabel.position.set(0, axisLength + 10, 0);
            zLabel.position.set(0, 0, axisLength + 10);
            axisGroup3D.add(xLabel); axisGroup3D.add(yLabel); axisGroup3D.add(zLabel);

            axisScene3D.add(axisGroup3D);
            axisScene3D.add(new THREE.AmbientLight(0xffffff, 1.0));
        }

        function isOrthographicView3D() {
            return String(fragSettings.viewMode || 'Orthographic').toLowerCase() === 'orthographic';
        }

        function createCamera3D(width, height) {
            const aspect = Math.max(width, 1) / Math.max(height, 1);
            if (isOrthographicView3D()) {
                const frustumSize = 20;
                return new THREE.OrthographicCamera(
                    (frustumSize * aspect) / -2,
                    (frustumSize * aspect) / 2,
                    frustumSize / 2,
                    frustumSize / -2,
                    -1000,
                    1000
                );
            }
            return new THREE.PerspectiveCamera(55, aspect, 0.1, 2000);
        }

        function updateCamera3DProjection(width, height) {
            if (!camera3D) return;
            const aspect = Math.max(width, 1) / Math.max(height, 1);
            if (camera3D.isPerspectiveCamera) {
                camera3D.aspect = aspect;
            } else {
                const frustumSize = 20;
                camera3D.left = (frustumSize * aspect) / -2;
                camera3D.right = (frustumSize * aspect) / 2;
                camera3D.top = frustumSize / 2;
                camera3D.bottom = frustumSize / -2;
            }
            camera3D.updateProjectionMatrix();
        }

        function updateOrthographicTrackballPanSpeed3D() {
            if (!renderer3D || !camera3D || !controls3D || !camera3D.isOrthographicCamera) return;
            const canvasWidth = renderer3D.domElement ? renderer3D.domElement.clientWidth : 0;
            const panel = document.getElementById('panel-3d');
            const fallbackWidth = panel ? panel.clientWidth : 800;
            const width = Math.max(canvasWidth || fallbackWidth, 1);
            const distance = Math.max(camera3D.position.distanceTo(controls3D.target), 0.1);
            controls3D.panSpeed = width / distance;
        }

        function init3D() {
            const panel  = document.getElementById('panel-3d');
            const canvas = document.getElementById('molecule-canvas-3d');
            if (!panel || !canvas) return;

            renderer3D = new THREE.WebGLRenderer({
                antialias: true,
                alpha: true,
                preserveDrawingBuffer: true,
                canvas: canvas,
            });
            renderer3D.outputEncoding    = THREE.sRGBEncoding;
            renderer3D.toneMapping       = THREE.ACESFilmicToneMapping;
            renderer3D.toneMappingExposure = 1.0;
            renderer3D.setPixelRatio(window.devicePixelRatio || 1);

            const w = Math.max(panel.clientWidth,  1);
            const h = Math.max(panel.clientHeight, 1);
            renderer3D.setSize(w, h);

            scene3D  = new THREE.Scene();
            camera3D = createCamera3D(w, h);
            camera3D.position.set(0, 0, 10);
            updateBgColor3D();

            controls3D = new THREE.TrackballControls(camera3D, renderer3D.domElement);
            controls3D.rotateSpeed = 2.0;
            controls3D.zoomSpeed   = 1.2;
            controls3D.panSpeed    = 0.8;
            controls3D.staticMoving = true;

            dirLight3D = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight3D.position.set(10, 10, 10);
            scene3D.add(dirLight3D);
            scene3D.add(new THREE.AmbientLight(0xffffff, 0.2));

            window.addEventListener('resize', handle3DResize);
            handle3DResize();
            setupAxisHelper3D();
            animate3D();

            // ── Mode-aware 3D interaction ─────────────────────────────────────
            // Use pointer events throughout: TrackballControls registers
            // 'pointerdown' on the canvas and calls event.preventDefault(), which
            // suppresses the subsequent 'mousedown'. By also listening on 'pointerdown'
            // we receive the event independently of what TrackballControls does.
            let md3 = null;
            let sel3DDragging    = false;
            let sel3DStartX      = 0, sel3DStartY = 0;
            let lasso3DClientPts = [];

            renderer3D.domElement.addEventListener('pointerdown', e => {
                if (e.button !== 0) return;
                md3 = { x: e.clientX, y: e.clientY };

                if (currentMode === 'rect') {
                    sel3DDragging = true;
                    sel3DStartX   = e.clientX;
                    sel3DStartY   = e.clientY;
                    update3DSelRectOverlay(sel3DStartX, sel3DStartY, sel3DStartX, sel3DStartY);
                } else if (currentMode === 'lasso') {
                    sel3DDragging    = true;
                    lasso3DClientPts = [[e.clientX, e.clientY]];
                    update3DLassoOverlay(lasso3DClientPts);
                }
            });

            window.addEventListener('pointermove', e => {
                if (sel3DDragging && currentMode === 'rect') {
                    update3DSelRectOverlay(sel3DStartX, sel3DStartY, e.clientX, e.clientY);
                } else if (sel3DDragging && currentMode === 'lasso') {
                    lasso3DClientPts.push([e.clientX, e.clientY]);
                    if (lasso3DClientPts.length % 3 === 0)
                        update3DLassoOverlay(lasso3DClientPts);
                }
            });

            window.addEventListener('pointerup', e => {
                if (!sel3DDragging) return;
                sel3DDragging = false;
                const additive = e.shiftKey;

                if (currentMode === 'rect') {
                    const dx = e.clientX - sel3DStartX;
                    const dy = e.clientY - sel3DStartY;
                    if (Math.hypot(dx, dy) > 4) {
                        applyArea3DSelection('rect',
                            [[sel3DStartX, sel3DStartY], [e.clientX, e.clientY]],
                            additive);
                    }
                } else if (currentMode === 'lasso') {
                    if (lasso3DClientPts.length > 4) {
                        applyArea3DSelection('lasso', lasso3DClientPts, additive);
                    }
                    lasso3DClientPts = [];
                }
                hide3DSelOverlay();
                md3 = null;
            });

            // Atom picking (navigate + click modes; rect/lasso handle their own selection)
            renderer3D.domElement.addEventListener('pointerup', e => {
                const areaMode = (currentMode === 'rect' || currentMode === 'lasso');
                if (areaMode) { md3 = null; return; }
                if (!md3) return;
                if (Math.hypot(e.clientX - md3.x, e.clientY - md3.y) < 5) {
                    const rect  = renderer3D.domElement.getBoundingClientRect();
                    const mouse = new THREE.Vector2(
                        ((e.clientX - rect.left)  / rect.width)  *  2 - 1,
                        ((e.clientY - rect.top)   / rect.height) * -2 + 1,
                    );
                    raycaster.setFromCamera(mouse, camera3D);
                    const hits = raycaster.intersectObjects(atomMeshes3D, false);
                    if (hits.length > 0) {
                        const idx = hits[0].object.userData.atomIndex;
                        if (idx !== undefined) toggleAtom(idx);
                    }
                }
                md3 = null;
            });
        }

        function animate3D() {
            requestAnimationFrame(animate3D);
            if (controls3D) controls3D.update();
            if (dirLight3D && camera3D) {
                if (fragSettings.showShading) {
                    const off = new THREE.Vector3(5, 8, 5);
                    dirLight3D.position.copy(
                        camera3D.position.clone().add(off.applyQuaternion(camera3D.quaternion))
                    );
                } else {
                    dirLight3D.position.copy(camera3D.position);
                }
            }
            if (renderer3D && scene3D && camera3D) {
                renderer3D.render(scene3D, camera3D);

                // Render axis helper in bottom-left corner
                if (fragSettings.showAxis && axisScene3D && axisCamera3D && axisGroup3D) {
                    axisGroup3D.quaternion.copy(camera3D.quaternion).invert();
                    const currentViewport = renderer3D.getViewport(new THREE.Vector4());
                    const currentAutoClear = renderer3D.autoClear;
                    const axisViewportSize = 150;
                    renderer3D.setViewport(15, 20, axisViewportSize, axisViewportSize);
                    renderer3D.setScissor(15, 20, axisViewportSize, axisViewportSize);
                    renderer3D.setScissorTest(true);
                    renderer3D.autoClear = false;
                    renderer3D.clearDepth();
                    renderer3D.render(axisScene3D, axisCamera3D);
                    renderer3D.autoClear = currentAutoClear;
                    renderer3D.setScissorTest(false);
                    renderer3D.setViewport(currentViewport);
                }
            }
        }

        function handle3DResize() {
            const panel = document.getElementById('panel-3d');
            if (!panel || !renderer3D || !camera3D) return;
            const w = Math.max(panel.clientWidth,  1);
            const h = Math.max(panel.clientHeight, 1);
            renderer3D.setSize(w, h);
            updateCamera3DProjection(w, h);
            if (controls3D && typeof controls3D.handleResize === 'function')
                controls3D.handleResize();
            updateOrthographicTrackballPanSpeed3D();
        }

        function updateBgColor3D() {
            if (!scene3D || !renderer3D) return;
            const col = new THREE.Color(fragSettings.backgroundColor);
            scene3D.background = col;
            renderer3D.setClearColor(col, 1);
            const p2d = document.getElementById('panel-2d');
            if (p2d) {
                const off = 10 / 255;
                p2d.style.background = '#' + new THREE.Color(
                    Math.min(1, col.r + off),
                    Math.min(1, col.g + off),
                    Math.min(1, col.b + off)
                ).getHexString();
            }
        }

        function disposeObj3D(obj) {
            obj.traverse(child => {
                if (child.geometry && !child.geometry._isCached) child.geometry.dispose();
                if (child.material) {
                    if (Array.isArray(child.material)) child.material.forEach(m => {
                        if (m.dispose && !m._isCached) m.dispose();
                    });
                    else if (child.material.dispose && !child.material._isCached) child.material.dispose();
                }
            });
        }

        function fitCamera3D(group) {
            if (!camera3D || !controls3D) return;
            const box = new THREE.Box3().setFromObject(group);
            if (!isFinite(box.max.x)) return;
            const center  = box.getCenter(new THREE.Vector3());
            const size    = box.getSize(new THREE.Vector3());
            const maxDim  = Math.max(size.x, size.y, size.z, 1);
            if (camera3D.isPerspectiveCamera) {
                const halfFov = THREE.MathUtils.degToRad(camera3D.fov / 2);
                const dist    = maxDim / (2 * Math.tan(halfFov)) + maxDim;
                camera3D.position.copy(center.clone().add(new THREE.Vector3(dist, dist * 0.5, dist)));
            } else {
                const dist = maxDim * 3;
                camera3D.position.copy(center.clone().add(new THREE.Vector3(dist, dist * 0.5, dist)));
                camera3D.zoom = Math.max(0.01, 20 / (maxDim * 2.4));
                const panel = document.getElementById('panel-3d');
                const w = panel ? Math.max(panel.clientWidth, 1) : 1;
                const h = panel ? Math.max(panel.clientHeight, 1) : 1;
                updateCamera3DProjection(w, h);
            }
            controls3D.target.copy(center);
            controls3D.update();
            camera3D.lookAt(center);
            camera3D.updateProjectionMatrix();
            updateOrthographicTrackballPanSpeed3D();
        }

        /** Full 3-D molecule re-render (atoms + bonds). */
        function renderMolecule3D() {
            if (!scene3D || !molData) return;
            if (moleculeGroup3D) { scene3D.remove(moleculeGroup3D); disposeObj3D(moleculeGroup3D); }
            moleculeGroup3D = new THREE.Group();
            atomMeshes3D    = [];

            const positions  = molData.positions.map(p => new THREE.Vector3(...p));
            const symbols    = molData.symbols;
            cachedPos3D      = positions;
            cachedSymbols    = symbols;

            const atomScale  = Math.max(fragSettings.atomSize, 0.05);
            const bondRadius = 0.1;
            const cutoff     = fragSettings.bondThreshold;
            const style      = (fragSettings.style || 'cartoon').toLowerCase();
            const af         = atomFactories[style]  || atomFactories['default'];
            const bf         = bondFactories[style]  || bondFactories['default'];

            // Performance: LOD and caching
            const lodSeg = getLODSegments(positions.length, 'auto');
            clearPerformanceCache();

            const uniq = [...new Set(symbols)];
            const grey = {};
            uniq.forEach((s, i) => {
                grey[s] = new THREE.Color().setHSL(0, 0, (i+1) / (uniq.length+1)).getHex();
            });
            const helpers = { greyColorMap: grey, _lod: lodSeg };

            // Bonds using spatial grid
            if (fragSettings.showBond) {
                const bp = findBondsSpatialGrid(positions, symbols, cutoff);
                for (let b = 0; b < bp.length; b++) {
                    const { i, j } = bp[b];
                    if (isBondHidden(symbols[i], symbols[j])) continue;
                    const bond = bf(positions[i], positions[j], symbols[i], symbols[j], bondRadius, atomScale, helpers);
                    if (bond) { bond.userData.bondA = i; bond.userData.bondB = j; bond.renderOrder = 1; moleculeGroup3D.add(bond); }
                }
            }

            // Atoms (tag each mesh for raycasting)
            for (let i = 0; i < positions.length; i++) {
                if (isHydrogenHidden(symbols[i])) continue;
                const atom = af(positions[i], symbols[i], atomScale, helpers);
                if (atom) {
                    atom.traverse(child => {
                        if (child.isMesh) { child.userData.atomIndex = i; atomMeshes3D.push(child); }
                    });
                    atom.userData.atomIndex = i;
                    atom.renderOrder = 0;
                    moleculeGroup3D.add(atom);
                }
            }

            // Unit cell
            if (fragSettings.showCell && molData.cell) {
                const cellVectors = molData.cell.map(c => new THREE.Vector3(...c));
                const points = [
                    new THREE.Vector3(0, 0, 0), cellVectors[0],
                    new THREE.Vector3(0, 0, 0), cellVectors[1],
                    new THREE.Vector3(0, 0, 0), cellVectors[2],
                    cellVectors[0], cellVectors[0].clone().add(cellVectors[1]),
                    cellVectors[0], cellVectors[0].clone().add(cellVectors[2]),
                    cellVectors[1], cellVectors[1].clone().add(cellVectors[0]),
                    cellVectors[1], cellVectors[1].clone().add(cellVectors[2]),
                    cellVectors[2], cellVectors[2].clone().add(cellVectors[0]),
                    cellVectors[2], cellVectors[2].clone().add(cellVectors[1]),
                    cellVectors[0].clone().add(cellVectors[1]), cellVectors[0].clone().add(cellVectors[1]).add(cellVectors[2]),
                    cellVectors[0].clone().add(cellVectors[2]), cellVectors[0].clone().add(cellVectors[1]).add(cellVectors[2]),
                    cellVectors[1].clone().add(cellVectors[2]), cellVectors[0].clone().add(cellVectors[1]).add(cellVectors[2])
                ];
                const cellGeometry = new THREE.BufferGeometry().setFromPoints(points);
                const cellMaterial = new THREE.LineBasicMaterial({ color: toLinearColor(fragSettings.cellColor) });
                const cellMesh = new THREE.LineSegments(cellGeometry, cellMaterial);
                cellMesh.renderOrder = 2;
                moleculeGroup3D.add(cellMesh);
            }

            // Show/hide cell color control
            const cellColorGroup = document.getElementById('cell-color-group');
            if (cellColorGroup) {
                cellColorGroup.style.display = (molData.cell) ? 'block' : 'none';
            }

            scene3D.add(moleculeGroup3D);
            if (fitOnNextRender) { fitCamera3D(moleculeGroup3D); fitOnNextRender = false; }
            renderSelOverlay3D();
            applyHideHydrogens();
        }

        /** Rebuild the transparent yellow selection-sphere + bond overlay. */
        function renderSelOverlay3D() {
            if (!scene3D) return;
            if (selOverlayGroup) { scene3D.remove(selOverlayGroup); disposeObj3D(selOverlayGroup); }
            selOverlayGroup = new THREE.Group();
            const atomScale  = Math.max(fragSettings.atomSize, 0.05);
            const selMat = new THREE.MeshBasicMaterial({
                color: 0xeab308, transparent: true, opacity: 0.72, depthWrite: false,
            });

            // Atom spheres
            for (const idx of selectedAtoms) {
                if (idx >= cachedPos3D.length) continue;
                if (isHydrogenHidden(cachedSymbols[idx])) continue;
                const sym   = cachedSymbols[idx] || 'C';
                const info  = atomInfo[sym] || atomInfo['default'];
                const r     = info.radius * atomScale * 1.50;
                const mesh  = new THREE.Mesh(new THREE.SphereGeometry(r, 16, 12), selMat);
                mesh.position.copy(cachedPos3D[idx]);
                mesh.renderOrder = 5;
                selOverlayGroup.add(mesh);
            }

            // Bond cylinders between selected atom pairs
            if (layout2D) {
                const up = new THREE.Vector3(0, 1, 0);
                layout2D.bonds.forEach(([a, b]) => {
                    if (!selectedAtoms.has(a) || !selectedAtoms.has(b)) return;
                    if (a >= cachedPos3D.length || b >= cachedPos3D.length) return;
                    if (isBondHidden(cachedSymbols[a], cachedSymbols[b])) return;
                    const pA = cachedPos3D[a], pB = cachedPos3D[b];
                    const dir = new THREE.Vector3().subVectors(pB, pA);
                    const len = dir.length();
                    if (len < 1e-6) return;
                    const cyl = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.12, 0.12, len, 8),
                        selMat
                    );
                    cyl.position.copy(pA).addScaledVector(dir, 0.5);
                    cyl.quaternion.setFromUnitVectors(up, dir.clone().normalize());
                    cyl.renderOrder = 5;
                    selOverlayGroup.add(cyl);
                });
            }

            // Cell overlay: yellow highlight when any atoms are selected
            if (selectedAtoms.size > 0 && fragSettings.showCell && molData && molData.cell) {
                const cellVectors = molData.cell.map(c => new THREE.Vector3(...c));
                const pts = [
                    new THREE.Vector3(0, 0, 0), cellVectors[0],
                    new THREE.Vector3(0, 0, 0), cellVectors[1],
                    new THREE.Vector3(0, 0, 0), cellVectors[2],
                    cellVectors[0], cellVectors[0].clone().add(cellVectors[1]),
                    cellVectors[0], cellVectors[0].clone().add(cellVectors[2]),
                    cellVectors[1], cellVectors[1].clone().add(cellVectors[0]),
                    cellVectors[1], cellVectors[1].clone().add(cellVectors[2]),
                    cellVectors[2], cellVectors[2].clone().add(cellVectors[0]),
                    cellVectors[2], cellVectors[2].clone().add(cellVectors[1]),
                    cellVectors[0].clone().add(cellVectors[1]), cellVectors[0].clone().add(cellVectors[1]).add(cellVectors[2]),
                    cellVectors[0].clone().add(cellVectors[2]), cellVectors[0].clone().add(cellVectors[1]).add(cellVectors[2]),
                    cellVectors[1].clone().add(cellVectors[2]), cellVectors[0].clone().add(cellVectors[1]).add(cellVectors[2])
                ];
                const cellGeom = new THREE.BufferGeometry().setFromPoints(pts);
                const cellSelMat = new THREE.LineBasicMaterial({
                    color: 0xeab308, transparent: true, opacity: 0.72,
                });
                const cellSel = new THREE.LineSegments(cellGeom, cellSelMat);
                cellSel.renderOrder = 5;
                selOverlayGroup.add(cellSel);
            }

            scene3D.add(selOverlayGroup);
        }

        // ═════════════════════════════════════════════════════════════════════
        // ── Selection logic ──────────────────────────────────────────────────
        // ═════════════════════════════════════════════════════════════════════

        function toggleAtom(idx) {
            if (selectedAtoms.has(idx)) selectedAtoms.delete(idx);
            else                        selectedAtoms.add(idx);
            updateSelectionVisuals();
        }

        function updateSelectionVisuals() {
            updateSVGSelection();
            renderSelOverlay3D();
            updateIndexPanel();
        }

        function applyHideHydrogens() {
            if (!molData) return;
            const syms = molData.symbols;
            const hideHydrogens = !!fragSettings.hideHydrogens;
            if (hideHydrogens) {
                let changed = false;
                for (const idx of [...selectedAtoms]) {
                    if (syms[idx] === 'H') { selectedAtoms.delete(idx); changed = true; }
                }
                if (changed) updateIndexPanel();
            }
            document.querySelectorAll('.atom-group[data-is-h]').forEach(grp => {
                grp.style.display = hideHydrogens ? 'none' : '';
            });
            document.querySelectorAll('.bond-seg').forEach(el => {
                const a = parseInt(el.getAttribute('data-bond-a'));
                const b = parseInt(el.getAttribute('data-bond-b'));
                if (syms[a] === 'H' || syms[b] === 'H')
                    el.style.display = hideHydrogens ? 'none' : '';
            });
            if (moleculeGroup3D) {
                moleculeGroup3D.children.forEach(obj => {
                    if (obj.userData.atomIndex !== undefined && syms[obj.userData.atomIndex] === 'H')
                        obj.visible = !hideHydrogens;
                    else if (obj.userData.bondA !== undefined &&
                            (syms[obj.userData.bondA] === 'H' || syms[obj.userData.bondB] === 'H'))
                        obj.visible = !hideHydrogens;
                });
            }
            renderSelOverlay3D();
        }

        function updateIndexPanel() {
            if (!molData) return;
            const n          = molData.symbols.length;
            const selected   = [...selectedAtoms].sort((a, b) => a - b);
            const unselected = Array.from({ length: n }, (_, i) => i).filter(i => !selectedAtoms.has(i));

            document.getElementById('selected-count').textContent   = selected.length;
            document.getElementById('unselected-count').textContent = unselected.length;
            document.getElementById('selected-indices').value   = '[' + selected.join(', ') + ']';
            document.getElementById('unselected-indices').value = '[' + unselected.join(', ') + ']';
        }

        // ═════════════════════════════════════════════════════════════════════
        // ── UI controls ──────────────────────────────────────────────────────
        // ═════════════════════════════════════════════════════════════════════

        function toggleCard(id) {
            const content = document.getElementById(id + '-content');
            const arrow   = document.getElementById(id + '-arrow');
            if (!content) return;
            const collapsed = content.classList.toggle('collapsed');
            if (arrow) arrow.classList.toggle('rotated', collapsed);
        }

        function initSplitter() {
            const splitter    = document.getElementById('splitter');
            const panel2d     = document.getElementById('panel-2d');
            const mainContent = document.querySelector('.main-content');
            let dragging = false, startX = 0, startW = 0;

            splitter.addEventListener('mousedown', e => {
                dragging = true;
                startX   = e.clientX;
                startW   = panel2d.offsetWidth;
                splitter.classList.add('active');
                e.preventDefault();
            });
            window.addEventListener('mousemove', e => {
                if (!dragging) return;
                const totalW = mainContent.offsetWidth - 5;  // minus splitter
                const newW   = Math.max(150, Math.min(startW + (e.clientX - startX), totalW - 150));
                panel2d.style.flex  = 'none';
                panel2d.style.width = newW + 'px';
                fitSVG();
                handle3DResize();
            });
            window.addEventListener('mouseup', () => {
                if (dragging) { dragging = false; splitter.classList.remove('active'); }
            });
        }

        /** Recompute layout + rebuild both panels when bond threshold changes. */
        function recompute() {
            if (!molData) return;
            layout2D = computeLayout(molData.positions, molData.symbols, fragSettings.bondThreshold);
            buildSVG();
            fitSVG();
            renderMolecule3D();
        }

        function initUIEvents() {
            // Sidebar toggle
            document.getElementById('sidebar-toggle').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('collapsed');
                setTimeout(() => { fitSVG(); handle3DResize(); }, 320);
            });

            // Bond threshold
            const btSlider = document.getElementById('bond-threshold');
            btSlider.value = fragSettings.bondThreshold;
            document.getElementById('bond-threshold-value').textContent = parseFloat(btSlider.value).toFixed(2);
            btSlider.addEventListener('input', function () {
                fragSettings.bondThreshold = parseFloat(this.value);
                document.getElementById('bond-threshold-value').textContent = parseFloat(this.value).toFixed(2);
                recompute();
            });

            // Atom size
            const asSlider = document.getElementById('atom-size');
            asSlider.value = fragSettings.atomSize;
            document.getElementById('atom-size-value').textContent = parseFloat(asSlider.value).toFixed(2);
            asSlider.addEventListener('input', function () {
                fragSettings.atomSize = parseFloat(this.value);
                document.getElementById('atom-size-value').textContent = parseFloat(this.value).toFixed(2);
                renderMolecule3D();
            });

            // 3D style
            const styleSelect = document.getElementById('style-select');
            styleSelect.value = fragSettings.style || 'cartoon';
            styleSelect.addEventListener('change', function () {
                fragSettings.style = this.value;
                renderMolecule3D();
            });

            const hideHydrogensCb = document.getElementById('hide-hydrogens');
            if (hideHydrogensCb) {
                hideHydrogensCb.checked = !!fragSettings.hideHydrogens;
                hideHydrogensCb.addEventListener('change', function () {
                    fragSettings.hideHydrogens = this.checked;
                    buildSVG();
                    fitSVG();
                    renderMolecule3D();
                });
            }

            const showBlurCb = document.getElementById('show-blur');
            if (showBlurCb) {
                showBlurCb.checked = !!fragSettings.showBlur;
                showBlurCb.addEventListener('change', function () {
                    fragSettings.showBlur = this.checked;
                    updateBlurEffect();
                });
            }

            const blurSlider = document.getElementById('blur-strength');
            if (blurSlider) {
                blurSlider.value = getBlurStrengthValue().toFixed(1);
                blurSlider.addEventListener('input', function () {
                    fragSettings.blurStrength = parseFloat(this.value);
                    updateBlurEffect();
                });
            }
            updateBlurEffect();

            // Background colour
            const bgInput = document.getElementById('bg-color');
            bgInput.value = fragSettings.backgroundColor || '#1f2937';
            document.getElementById('bg-color-value').textContent = bgInput.value;
            bgInput.addEventListener('input', function () {
                fragSettings.backgroundColor = this.value;
                document.getElementById('bg-color-value').textContent = this.value;
                updateBgColor3D();
            });

            // Cell toggle
            const showCellCb = document.getElementById('show-cell');
            if (showCellCb) {
                showCellCb.checked = fragSettings.showCell;
                showCellCb.addEventListener('change', function () {
                    fragSettings.showCell = this.checked;
                    renderMolecule3D();
                });
            }

            // Cell color
            const cellColorInput = document.getElementById('cell-color');
            if (cellColorInput) {
                cellColorInput.value = fragSettings.cellColor || '#808080';
                document.getElementById('cell-color-value').textContent = cellColorInput.value;
                cellColorInput.addEventListener('input', function () {
                    fragSettings.cellColor = this.value;
                    document.getElementById('cell-color-value').textContent = this.value;
                    renderMolecule3D();
                });
            }

            // Axis toggle
            const showAxisCb = document.getElementById('show-axis');
            if (showAxisCb) {
                showAxisCb.checked = fragSettings.showAxis;
                showAxisCb.addEventListener('change', function () {
                    fragSettings.showAxis = this.checked;
                });
            }

            // Selection buttons
            document.getElementById('select-all-btn').addEventListener('click', () => {
                if (molData) molData.symbols.forEach((_, i) => selectedAtoms.add(i));
                updateSelectionVisuals();
            });
            document.getElementById('clear-btn').addEventListener('click', () => {
                selectedAtoms.clear();
                updateSelectionVisuals();
            });
            document.getElementById('invert-btn').addEventListener('click', () => {
                if (!molData) return;
                molData.symbols.forEach((_, i) => {
                    if (selectedAtoms.has(i)) selectedAtoms.delete(i);
                    else                      selectedAtoms.add(i);
                });
                updateSelectionVisuals();
            });
            document.getElementById('expand-h-btn').addEventListener('click', () => {
                if (!molData || !layout2D) return;
                const syms = molData.symbols;
                layout2D.bonds.forEach(([a, b]) => {
                    if (selectedAtoms.has(a) && syms[b] === 'H') selectedAtoms.add(b);
                    if (selectedAtoms.has(b) && syms[a] === 'H') selectedAtoms.add(a);
                });
                updateSelectionVisuals();
            });
            // Clipboard helper — works in file:// / iframe contexts without HTTPS
            function copyText(text) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).catch(() => execCopy(text));
                } else {
                    execCopy(text);
                }
            }
            function execCopy(text) {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
                document.body.appendChild(ta);
                ta.focus(); ta.select();
                try { document.execCommand('copy'); } catch (_) {}
                document.body.removeChild(ta);
            }

            // Copy buttons
            document.getElementById('copy-selected-btn').addEventListener('click', () => {
                copyText(document.getElementById('selected-indices').value);
            });
            document.getElementById('copy-unselected-btn').addEventListener('click', () => {
                copyText(document.getElementById('unselected-indices').value);
            });

            const copyFormatChip = document.getElementById('copy-format-chip');
            if (copyFormatChip) {
                copyFormatChip.addEventListener('click', cycleCopyFormat);
                updateCopyFormatChip();
            }

            // Copy XYZ buttons
            document.getElementById('xyz-byfrag-btn').addEventListener('click', () => {
                const xyz = buildXyzByFrag();
                if (xyz) copyText(xyz);
            });
            document.getElementById('xyz-reindexed-btn').addEventListener('click', () => {
                const xyz = buildXyzReindexed();
                if (xyz) copyText(xyz);
            });

            // Window resize
            window.addEventListener('resize', () => { fitSVG(); handle3DResize(); });

            // Mode toolbar buttons
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', () => setMode(btn.dataset.mode));
            });

            // ResizeObserver: re-fit SVG whenever the panel size changes
            if (typeof ResizeObserver !== 'undefined') {
                new ResizeObserver(() => { fitSVG(); handle3DResize(); })
                    .observe(document.getElementById('panel-2d'));
            }
        }

        // ═════════════════════════════════════════════════════════════════════
        // ── Entry point ──────────────────────────────────────────────────────
        // ═════════════════════════════════════════════════════════════════════

        document.addEventListener('DOMContentLoaded', () => {
            init3D();
            initSVGInteraction();
            initSplitter();
            initUIEvents();

            if (molData && molData.symbols && molData.symbols.length > 0) {
                layout2D = computeLayout(
                    molData.positions, molData.symbols, fragSettings.bondThreshold
                );
                buildSVG();
                renderMolecule3D();
                updateIndexPanel();
                // Fit SVG after first paint
                requestAnimationFrame(() => { requestAnimationFrame(fitSVG); });
            }
        });

        // ═════════════════════════════════════════════════════════════════════
        // ── PostMessage API for iframe embedding (JS module) ────────────────
        // ═════════════════════════════════════════════════════════════════════

        /**
         * Load new molecular data and recompute everything.
         * Accepts a single-element array [{ symbols, positions }].
         */
        function setMolecularData(dataArray) {
            const d = Array.isArray(dataArray) ? dataArray[0] : dataArray;
            if (!d || !d.symbols || !d.positions) return;

            // Update the global molData reference; clear fields absent in new data
            if (!d.cell) delete molData.cell;
            Object.assign(molData, d);

            // Reset selection
            selectedAtoms.clear();

            // Recompute layout and rebuild both panels
            layout2D = computeLayout(molData.positions, molData.symbols, fragSettings.bondThreshold);
            buildSVG();
            fitOnNextRender = true;
            renderMolecule3D();
            updateIndexPanel();
            requestAnimationFrame(() => { requestAnimationFrame(fitSVG); });
        }

        window.addEventListener('message', function (event) {
            const msg = event.data;
            if (!msg || !msg.type) return;

            switch (msg.type) {
                case 'setData':
                    if (msg.data) {
                        setMolecularData(msg.data);
                    }
                    break;

                case 'setSettings':
                    if (msg.settings) {
                        Object.assign(fragSettings, msg.settings);
                        // Update UI controls to reflect new settings
                        const btSlider = document.getElementById('bond-threshold');
                        if (btSlider && msg.settings.bondThreshold !== undefined) {
                            btSlider.value = fragSettings.bondThreshold;
                            document.getElementById('bond-threshold-value').textContent =
                                parseFloat(fragSettings.bondThreshold).toFixed(2);
                        }
                        const asSlider = document.getElementById('atom-size');
                        if (asSlider && msg.settings.atomSize !== undefined) {
                            asSlider.value = fragSettings.atomSize;
                            document.getElementById('atom-size-value').textContent =
                                parseFloat(fragSettings.atomSize).toFixed(2);
                        }
                        const styleSelect = document.getElementById('style-select');
                        if (styleSelect && msg.settings.style !== undefined) {
                            styleSelect.value = fragSettings.style;
                        }
                        const bgInput = document.getElementById('bg-color');
                        if (bgInput && msg.settings.backgroundColor !== undefined) {
                            bgInput.value = fragSettings.backgroundColor;
                            document.getElementById('bg-color-value').textContent = fragSettings.backgroundColor;
                            updateBgColor3D();
                        }
                        const showCellCbMsg = document.getElementById('show-cell');
                        if (showCellCbMsg && msg.settings.showCell !== undefined) {
                            showCellCbMsg.checked = fragSettings.showCell;
                        }
                        const cellColorInputMsg = document.getElementById('cell-color');
                        if (cellColorInputMsg && msg.settings.cellColor !== undefined) {
                            cellColorInputMsg.value = fragSettings.cellColor;
                            const ccv = document.getElementById('cell-color-value');
                            if (ccv) ccv.textContent = fragSettings.cellColor;
                        }
                        const showAxisCbMsg = document.getElementById('show-axis');
                        if (showAxisCbMsg && msg.settings.showAxis !== undefined) {
                            showAxisCbMsg.checked = fragSettings.showAxis;
                        }
                        const hideHydrogensCbMsg = document.getElementById('hide-hydrogens');
                        if (hideHydrogensCbMsg && msg.settings.hideHydrogens !== undefined) {
                            hideHydrogensCbMsg.checked = !!fragSettings.hideHydrogens;
                        }
                        const showBlurCbMsg = document.getElementById('show-blur');
                        if (showBlurCbMsg && msg.settings.showBlur !== undefined) {
                            showBlurCbMsg.checked = !!fragSettings.showBlur;
                        }
                        const blurSliderMsg = document.getElementById('blur-strength');
                        if (blurSliderMsg && msg.settings.blurStrength !== undefined) {
                            blurSliderMsg.value = getBlurStrengthValue().toFixed(1);
                        }
                        updateBlurEffect();
                        recompute();
                    }
                    break;

                case 'setSelection':
                    if (msg.indices && Array.isArray(msg.indices)) {
                        selectedAtoms.clear();
                        msg.indices.forEach(i => selectedAtoms.add(i));
                        updateSelectionVisuals();
                    }
                    break;

                case 'clearSelection':
                    selectedAtoms.clear();
                    updateSelectionVisuals();
                    break;

                case 'getSelection':
                    if (event.source) {
                        event.source.postMessage({
                            type: 'selectionResponse',
                            selected: [...selectedAtoms].sort((a, b) => a - b),
                        }, '*');
                    }
                    break;

                case 'ready':
                    if (event.source) {
                        event.source.postMessage({ type: 'ready', viewer: 'fragSelector' }, '*');
                    }
                    break;
            }
        });

        // Notify parent that viewer is loaded
        if (window.parent !== window) {
            window.parent.postMessage({ type: 'viewerLoaded', viewer: 'fragSelector' }, '*');
        }
    </script>
</body>

</html>
