<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASEView — Playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --surface2:  #273449;
      --border:    #334155;
      --accent:    #3b82f6;
      --accent-h:  #2563eb;
      --text:      #e2e8f0;
      --muted:     #94a3b8;
      --success:   #22c55e;
      --error:     #ef4444;
      --warn:      #f59e0b;
      --radius:    0.5rem;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.6rem 1.2rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .header-title { font-size: 1.05rem; font-weight: 700; color: #60a5fa; white-space: nowrap; }
    .header-sep { color: var(--border); }

    /* ── Toolbar ── */
    .toolbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.55rem 1.2rem;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    label.lbl {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
    }

    select.sel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 0.35rem 0.6rem;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
    }
    select.sel:focus { border-color: var(--accent); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 0.35rem 0.75rem;
      font-size: 0.82rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: var(--border); border-color: var(--accent); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { background: var(--accent-h); border-color: var(--accent-h); }

    #file-input { display: none; }

    .viewer-badge {
      font-size: 0.75rem;
      padding: 0.2rem 0.55rem;
      border-radius: 99px;
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.3);
      color: #93c5fd;
      white-space: nowrap;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .status-dot.ok { background: var(--success); }
    .status-dot.err { background: var(--error); }
    .status-dot.warn { background: var(--warn); }
    #status-text { font-size: 0.78rem; color: var(--muted); }

    .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 0.5rem; }

    /* ── Viewer area ── */
    #viewer-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
      background: #111827;
    }
    #viewer-container {
      width: 100%;
      height: 100%;
    }

    /* ── Help panel ── */
    .help-panel {
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      max-height: 220px;
      overflow: hidden;
      transition: max-height 0.25s ease;
    }
    .help-panel.collapsed { max-height: 36px; }
    .help-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 1.2rem;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.78rem;
      text-align: left;
      border-bottom: 1px solid transparent;
    }
    .help-panel:not(.collapsed) .help-toggle { border-bottom-color: var(--border); }
    .help-toggle:hover { color: var(--text); }
    .help-arrow { transition: transform 0.2s; }
    .help-panel.collapsed .help-arrow { transform: rotate(-90deg); }

    .help-body {
      padding: 0.75rem 1.2rem 0.9rem;
      overflow-y: auto;
      max-height: 184px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 0.75rem 2rem;
    }
    .help-section h4 {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .help-section p, .help-section li {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .help-section ul { padding-left: 1rem; }
    code {
      font-family: 'Courier New', monospace;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      padding: 1px 4px;
      font-size: 0.72rem;
      color: #a5f3fc;
    }

    /* ── Drop overlay ── */
    #drop-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(59,130,246,0.12);
      border: 2px dashed var(--accent);
      z-index: 100;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: var(--accent);
      pointer-events: none;
    }
    #drop-overlay.active { display: flex; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.55rem 1.1rem;
      font-size: 0.82rem;
      color: var(--text);
      transition: transform 0.25s;
      z-index: 200;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.toast-ok { border-color: var(--success); color: var(--success); }
    #toast.toast-err { border-color: var(--error); color: var(--error); }

    /* ── Paste modal ── */
    #paste-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    #paste-backdrop.open { display: flex; }

    .paste-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      width: min(640px, 90vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .paste-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .paste-header h3 { font-size: 0.9rem; font-weight: 600; }
    .paste-close {
      background: none; border: none; color: var(--muted);
      font-size: 1.2rem; cursor: pointer; padding: 0 0.3rem;
    }
    .paste-close:hover { color: var(--text); }

    .paste-body { padding: 0.75rem 1rem; flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 0.6rem; }

    .paste-row { display: flex; align-items: center; gap: 0.6rem; }

    #paste-area {
      flex: 1;
      min-height: 180px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      padding: 0.6rem 0.75rem;
      resize: none;
      outline: none;
      line-height: 1.45;
    }
    #paste-area:focus { border-color: var(--accent); }
    #paste-area::placeholder { color: var(--muted); }

    .paste-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      border-top: 1px solid var(--border);
    }
    .paste-hint { font-size: 0.72rem; color: var(--muted); }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <span class="header-title">ASEView</span>
  <span class="header-sep">|</span>
  <span style="font-size:0.82rem;color:var(--muted);">Playground</span>
</header>

<!-- ── Toolbar ── -->
<div class="toolbar">
  <!-- Viewer selector -->
  <div class="toolbar-group">
    <label class="lbl" for="viewer-type">Viewer</label>
    <select class="sel" id="viewer-type">
      <option value="MolecularViewer">MolecularViewer</option>
      <option value="OverlayViewer">OverlayViewer</option>
      <option value="NormalModeViewer">NormalModeViewer</option>
      <option value="FragSelector">FragSelector</option>
    </select>
  </div>

  <!-- Format selector -->
  <div class="toolbar-group">
    <label class="lbl" for="format-type">Format</label>
    <select class="sel" id="format-type">
      <option value="auto">Auto</option>
      <option value="xyz">XYZ / extXYZ</option>
      <option value="poscar">POSCAR (VASP)</option>
      <option value="cif">CIF</option>
      <option value="sdf">SDF / MOL</option>
      <option value="pdb">PDB</option>
    </select>
  </div>

  <!-- File upload -->
  <div class="toolbar-group">
    <input type="file" id="file-input" accept=".xyz,.extxyz,.json,.poscar,.vasp,.cif,.sdf,.mol,.pdb,POSCAR,CONTCAR" />
    <button class="btn primary" id="upload-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
      </svg>
      Upload File
    </button>
  </div>

  <!-- Paste -->
  <button class="btn" id="paste-btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/>
      <rect x="8" y="2" width="8" height="4" rx="1"/>
    </svg>
    Paste
  </button>

  <!-- Load sample -->
  <button class="btn" id="sample-btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
    </svg>
    Load Sample
  </button>

  <!-- Status -->
  <div class="toolbar-right toolbar-group">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Ready</span>
    <span class="viewer-badge" id="viewer-badge">MolecularViewer</span>
  </div>
</div>

<!-- ── Viewer ── -->
<div id="viewer-wrap">
  <div id="drop-overlay">Drop file to load</div>
  <div id="viewer-container"></div>
</div>

<!-- ── Help panel ── -->
<div class="help-panel collapsed" id="help-panel">
  <button class="help-toggle" id="help-toggle">
    <svg class="help-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M19 9l-7 7-7-7"/>
    </svg>
    Format Help
  </button>
  <div class="help-body" id="help-body"></div>
</div>

<!-- ── Paste modal ── -->
<div id="paste-backdrop">
  <div class="paste-modal">
    <div class="paste-header">
      <h3>Paste molecular data</h3>
      <button class="paste-close" id="paste-close">&times;</button>
    </div>
    <div class="paste-body">
      <textarea id="paste-area" placeholder="Paste molecular data here (XYZ, extXYZ, POSCAR, CIF, SDF, PDB)...&#10;&#10;Example XYZ:&#10;3&#10;water&#10;O  0.000  0.000  0.117&#10;H  0.000  0.757 -0.469&#10;H  0.000 -0.757 -0.469" spellcheck="false"></textarea>
    </div>
    <div class="paste-footer">
      <span class="paste-hint">Format is auto-detected, or set explicitly in toolbar. Ctrl+V anywhere to open.</span>
      <button class="btn primary" id="paste-load-btn">Load</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>

<!-- ── Scripts ── -->
<script src="https://raw.githack.com/kangmg/aseview/main/aseview/static/js/aseview.js"></script>
<script>
// ─────────────────────────────────────────────────────────────
// Sample data
// ─────────────────────────────────────────────────────────────

                    [1.869,0.485,0.000],[-0.570,1.035,0.889],[-0.570,1.035,-0.889],

      { symbols: ['O','H','H'], positions: [[0,0,0.117],[0,0.757,-0.469],[0,-0.757,-0.469]] },
      { symbols: ['O','H','H'], positions: [[0,0,0.050],[0,0.900,-0.400],[0,-0.900,-0.400]] },
      { symbols: ['O','H','H'], positions: [[0,0,0.200],[0,0.600,-0.550],[0,-0.600,-0.550]] }
    ]
  },
  NormalModeViewer: {
    label: 'Water — 3 vibrational modes',
    atoms: {
      symbols: ['O','H','H'],
      positions: [[0,0,0.117],[0,0.757,-0.469],[0,-0.757,-0.469]]
    },
    vibrationData: {

        [[0,0,-0.071],[0,0.422,0.565],[0,-0.422,0.565]],
        [[0,0.066,0],[0,-0.565,0.422],[0,0.565,0.422]],
        [[0.071,0,0],[-0.565,0,0],[-0.565,0,0]]
      ],
      frequencies: ['1595.32','3657.05','3755.93'],

    }
  },
  FragSelector: {

    data: {
      symbols: ['N','C','N','C','C','N','C','N','C','N','H','H','H','H','H'],
      positions: [
        [1.370,-0.021,0.000],[0.696,-1.197,0.000],[-0.696,-1.197,0.000],
        [-1.370,-0.021,0.000],[-0.696,1.197,0.000],[0.696,1.197,0.000],
        [2.770,-0.021,0.000],[-2.770,-0.021,0.000],[0.000,-2.394,0.000],
        [0.000,2.394,0.000],[3.170,-1.021,0.000],[3.170,0.979,0.000],
        [-3.170,-1.021,0.000],[-3.170,0.979,0.000],[0.000,-3.494,0.000]

// ─────────────────────────────────────────────────────────────
// Format help per viewer
// ─────────────────────────────────────────────────────────────
const FORMATS_SECTION = `
    <div class="help-section">
      <h4>Supported Formats</h4>
      <ul>
        <li><code>.xyz</code> / <code>.extxyz</code> — XYZ, Extended XYZ with <code>Lattice="..."</code></li>
        <li><code>POSCAR</code> / <code>.vasp</code> — VASP POSCAR / CONTCAR</li>
        <li><code>.cif</code> — Crystallographic Information File</li>
        <li><code>.sdf</code> / <code>.mol</code> — SDF / MOL V2000</li>
        <li><code>.pdb</code> — Protein Data Bank</li>
      </ul>
      <p>Format is auto-detected from extension or content; you can also force it in the toolbar dropdown.</p>
    </div>`;

const HELP = {
  MolecularViewer: `
    ${FORMATS_SECTION}
    <div class="help-section">
      <h4>Trajectory</h4>
      <p>Multi-frame XYZ is animated as a trajectory. PDB <code>MODEL</code> records are also supported.</p>
    </div>`,
  OverlayViewer: `
    ${FORMATS_SECTION}
    <div class="help-section">
      <h4>Multi-file Upload</h4>
      <p>Select multiple files at once — each file becomes one overlay structure. A single multi-frame XYZ is expanded into one structure per frame.</p>
    </div>`,
  NormalModeViewer: `
    <div class="help-section">
      <h4>Vibration Data</h4>
      <p>NormalModeViewer needs pre-computed mode vectors. Use the <b>Load Sample</b> button to try it with water's three modes, or load a JSON of shape <code>{atoms, vibrationData}</code>.</p>
    </div>
    <div class="help-section">
      <h4>JSON Shape</h4>
      <p><code>{"atoms":{"symbols":[...],"positions":[...]},"vibrationData":{"modeVectors":[[[dx,dy,dz],...],...],"frequencies":["1234.5"],"isImaginary":[false]}}</code></p>
    </div>`,
  FragSelector: `
    ${FORMATS_SECTION}
    <div class="help-section">
      <h4>Selection Modes</h4>
      <ul>
        <li><b>Click</b> — toggle single atom</li>
        <li><b>Rect</b> — drag rectangle to select region</li>
        <li><b>Lasso</b> — freehand selection</li>
      </ul>
      <p>Only a single structure is used (first frame if multi-frame).</p>
    </div>`
};

// ─────────────────────────────────────────────────────────────
// XYZ parser
// ─────────────────────────────────────────────────────────────
function parseXYZ(text) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  const frames = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i].trim();
    if (!line) { i++; continue; }
    const natoms = parseInt(line);
    if (isNaN(natoms) || natoms <= 0) { i++; continue; }
    if (i + 1 + natoms >= lines.length + 1) break;  // incomplete frame

    const comment = lines[i + 1] || '';
    const symbols = [], positions = [];

    for (let j = 0; j < natoms; j++) {
      const row = (lines[i + 2 + j] || '').trim().split(/\s+/);
      if (row.length < 4) continue;
      symbols.push(row[0]);
      positions.push([parseFloat(row[1]), parseFloat(row[2]), parseFloat(row[3])]);
    }

    if (symbols.length !== natoms) { i++; continue; }

    const frame = { symbols, positions };

    // Parse cell from extended XYZ comment: Lattice="a1 a2 a3 b1 ..."
    const latticeMatch = comment.match(/Lattice\s*=\s*"([^"]+)"/i);
    if (latticeMatch) {
      const vals = latticeMatch[1].trim().split(/\s+/).map(Number);
      if (vals.length === 9) {
        frame.cell = [
          [vals[0], vals[1], vals[2]],
          [vals[3], vals[4], vals[5]],
          [vals[6], vals[7], vals[8]]
        ];
      }
    }

    // Carry energy from comment if present
    const eMatch = comment.match(/energy[=\s]+(-?\d+\.?\d*(?:[eE][+-]?\d+)?)/i);
    if (eMatch) frame.energy = parseFloat(eMatch[1]);

    frames.push(frame);
    i += 2 + natoms;
  }
  return frames;
}

// ─────────────────────────────────────────────────────────────
// POSCAR / VASP parser (ref: ase/io/vasp.py read_vasp)
// ─────────────────────────────────────────────────────────────
function parsePOSCAR(text) {
  const raw = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  if (raw.length < 8) throw new Error('POSCAR: file too short');

  const stripComment = s => s.split(/[!#]/)[0];
  const toks = s => stripComment(s).trim().split(/\s+/).filter(Boolean);

  // Line 0: comment / title. May also hold symbols (ASE convention).
  const titleTokens = toks(raw[0]);

  // Line 1: scale (1 or 3 floats; negative = volume)
  const scaleToks = toks(raw[1]).map(Number);
  if (scaleToks.length === 0 || scaleToks.some(isNaN))
    throw new Error('POSCAR: invalid scale line');

  // Lines 2-4: lattice vectors
  const lattice = [];
  for (let k = 0; k < 3; k++) {
    const v = toks(raw[2 + k]).map(Number);
    if (v.length < 3 || v.some(isNaN))
      throw new Error('POSCAR: invalid lattice vector on line ' + (3 + k));
    lattice.push([v[0], v[1], v[2]]);
  }

  // Apply scale
  let cell;
  if (scaleToks.length === 1) {
    let s = scaleToks[0];
    if (s < 0) {
      // negative = target volume
      const [a, b, c] = lattice;
      const vol = Math.abs(
        a[0]*(b[1]*c[2]-b[2]*c[1]) - a[1]*(b[0]*c[2]-b[2]*c[0]) + a[2]*(b[0]*c[1]-b[1]*c[0])
      );
      s = Math.cbrt(-s / vol);
    }
    cell = lattice.map(v => v.map(x => x * s));
  } else if (scaleToks.length === 3) {
    cell = lattice.map((v, idx) => v.map(x => x * scaleToks[idx]));
  } else {
    throw new Error('POSCAR: scale must be 1 or 3 numbers');
  }

  // Line 5: either symbols (VASP5) or counts (VASP4)
  let lineIdx = 5;
  let line5 = toks(raw[lineIdx]);
  let symbolsList;
  let counts;
  const isNumeric = s => /^-?\d+$/.test(s);
  if (line5.every(isNumeric)) {
    // VASP4 — symbols come from title line
    if (titleTokens.length < line5.length)
      throw new Error('POSCAR: VASP4 format requires element symbols in first line');
    symbolsList = titleTokens.slice(0, line5.length);
    counts = line5.map(Number);
    lineIdx = 6;
  } else {
    symbolsList = line5;
    counts = toks(raw[lineIdx + 1]).map(Number);
    if (counts.some(isNaN))
      throw new Error('POSCAR: counts line invalid');
    lineIdx = 7;
  }
  if (counts.length !== symbolsList.length)
    throw new Error('POSCAR: symbols/counts length mismatch');

  const natoms = counts.reduce((a, b) => a + b, 0);
  const symbols = [];
  for (let k = 0; k < symbolsList.length; k++)
    for (let n = 0; n < counts[k]; n++) symbols.push(symbolsList[k]);

  // Optional Selective dynamics line
  let sel = toks(raw[lineIdx])[0] || '';
  if (sel && /^s/i.test(sel)) lineIdx++;

  // Coordinate mode line: D/d/C/c/K/k
  const modeLine = toks(raw[lineIdx])[0] || '';
  lineIdx++;
  const direct = /^[dD]/.test(modeLine);  // else Cartesian

  const positions = [];
  for (let k = 0; k < natoms; k++) {
    const v = toks(raw[lineIdx + k] || '').map(Number);
    if (v.length < 3 || v.slice(0, 3).some(isNaN))
      throw new Error('POSCAR: invalid coordinate line ' + (lineIdx + k + 1));
    if (direct) {
      // fractional → cartesian
      positions.push([
        v[0]*cell[0][0] + v[1]*cell[1][0] + v[2]*cell[2][0],
        v[0]*cell[0][1] + v[1]*cell[1][1] + v[2]*cell[2][1],
        v[0]*cell[0][2] + v[1]*cell[1][2] + v[2]*cell[2][2],
      ]);
    } else {
      // Cartesian coords are scaled by the global scale factor too
      const s = scaleToks.length === 1 && scaleToks[0] > 0 ? scaleToks[0] : 1.0;
      positions.push([v[0]*s, v[1]*s, v[2]*s]);
    }
  }

  return [{ symbols, positions, cell }];
}

// ─────────────────────────────────────────────────────────────
// CIF parser (simple — _cell_* + _atom_site_fract_*)
// ─────────────────────────────────────────────────────────────
function stripCIFNum(s) {
  // Remove standard uncertainty like "1.2345(6)"
  return parseFloat(String(s).replace(/\(\d+\)/, ''));
}

function cellABCtoVectors(a, b, c, alpha, beta, gamma) {
  const deg = Math.PI / 180;
  const ca = Math.cos(alpha*deg), cb = Math.cos(beta*deg), cg = Math.cos(gamma*deg);
  const sg = Math.sin(gamma*deg);
  const v1 = [a, 0, 0];
  const v2 = [b*cg, b*sg, 0];
  const cx = c*cb;
  const cy = c*(ca - cb*cg)/sg;
  const cz = Math.sqrt(Math.max(0, c*c - cx*cx - cy*cy));
  const v3 = [cx, cy, cz];
  return [v1, v2, v3];
}

function parseCIF(text) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  let a=null, b=null, c=null, alpha=90, beta=90, gamma=90;

  // Scan key-value pairs
  for (let i = 0; i < lines.length; i++) {
    const t = lines[i].trim();
    if (/^_cell_length_a\b/i.test(t))     a = stripCIFNum(t.split(/\s+/)[1]);
    else if (/^_cell_length_b\b/i.test(t)) b = stripCIFNum(t.split(/\s+/)[1]);
    else if (/^_cell_length_c\b/i.test(t)) c = stripCIFNum(t.split(/\s+/)[1]);
    else if (/^_cell_angle_alpha\b/i.test(t)) alpha = stripCIFNum(t.split(/\s+/)[1]);
    else if (/^_cell_angle_beta\b/i.test(t))  beta  = stripCIFNum(t.split(/\s+/)[1]);
    else if (/^_cell_angle_gamma\b/i.test(t)) gamma = stripCIFNum(t.split(/\s+/)[1]);
  }

  // Find loop_ containing _atom_site_*
  const symbols = [];
  const fracs = [];
  let i = 0;
  while (i < lines.length) {
    if (/^\s*loop_\s*$/i.test(lines[i])) {
      const headers = [];
      i++;
      while (i < lines.length && /^\s*_/.test(lines[i])) {
        headers.push(lines[i].trim());
        i++;
      }
      // Is this an atom_site loop?
      const hasAtomSite = headers.some(h => /^_atom_site_/i.test(h));
      if (!hasAtomSite) continue;

      const idxSymbol = headers.findIndex(h => /^_atom_site_type_symbol$/i.test(h));
      const idxLabel  = headers.findIndex(h => /^_atom_site_label$/i.test(h));
      const idxFX = headers.findIndex(h => /^_atom_site_fract_x$/i.test(h));
      const idxFY = headers.findIndex(h => /^_atom_site_fract_y$/i.test(h));
      const idxFZ = headers.findIndex(h => /^_atom_site_fract_z$/i.test(h));
      const idxCX = headers.findIndex(h => /^_atom_site_cartn_x$/i.test(h));
      const idxCY = headers.findIndex(h => /^_atom_site_cartn_y$/i.test(h));
      const idxCZ = headers.findIndex(h => /^_atom_site_cartn_z$/i.test(h));

      while (i < lines.length) {
        const raw = lines[i];
        const t = raw.trim();
        if (!t || /^loop_\s*$/i.test(t) || /^_/.test(t) || /^data_/i.test(t)) break;
        // Simple whitespace split — does not handle quoted strings with spaces
        const toks = t.split(/\s+/);
        if (toks.length >= headers.length) {
          const sym = idxSymbol >= 0 ? toks[idxSymbol]
                     : idxLabel  >= 0 ? toks[idxLabel].replace(/[^A-Za-z]/g, '').slice(0, 2) : 'X';
          // Strip trailing digits/charges from type_symbol like "Fe3+" → "Fe"
          const cleanSym = sym.match(/^[A-Z][a-z]?/)?.[0] || sym;
          if (idxFX >= 0 && idxFY >= 0 && idxFZ >= 0) {
            fracs.push([
              stripCIFNum(toks[idxFX]),
              stripCIFNum(toks[idxFY]),
              stripCIFNum(toks[idxFZ]),
              cleanSym, 'frac'
            ]);
          } else if (idxCX >= 0 && idxCY >= 0 && idxCZ >= 0) {
            fracs.push([
              stripCIFNum(toks[idxCX]),
              stripCIFNum(toks[idxCY]),
              stripCIFNum(toks[idxCZ]),
              cleanSym, 'cart'
            ]);
          }
        }
        i++;
      }
      continue;
    }
    i++;
  }

  if (fracs.length === 0) throw new Error('CIF: no _atom_site entries found');

  let cell = null;
  if (a != null && b != null && c != null && !isNaN(a) && !isNaN(b) && !isNaN(c))
    cell = cellABCtoVectors(a, b, c, alpha, beta, gamma);

  const positions = [];
  for (const row of fracs) {
    const [x, y, z, sym, kind] = row;
    symbols.push(sym);
    if (kind === 'frac' && cell) {
      positions.push([
        x*cell[0][0] + y*cell[1][0] + z*cell[2][0],
        x*cell[0][1] + y*cell[1][1] + z*cell[2][1],
        x*cell[0][2] + y*cell[1][2] + z*cell[2][2],
      ]);
    } else {
      positions.push([x, y, z]);
    }
  }

  const frame = { symbols, positions };
  if (cell) frame.cell = cell;
  return [frame];
}

// ─────────────────────────────────────────────────────────────
// SDF / MOL V2000 parser
// ─────────────────────────────────────────────────────────────
function parseSDF(text) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  if (lines.length < 4) throw new Error('SDF: file too short');
  // Line 4 is counts line. Chars 0-2 = natoms, 3-5 = nbonds (fixed width).
  const counts = lines[3];
  const natoms = parseInt(counts.substring(0, 3));
  if (!natoms || isNaN(natoms)) throw new Error('SDF: invalid counts line');

  const symbols = [], positions = [];
  for (let k = 0; k < natoms; k++) {
    const ln = lines[4 + k] || '';
    // Fixed columns: x [0,10), y [10,20), z [20,30), symbol [31,34)
    const x = parseFloat(ln.substring(0, 10));
    const y = parseFloat(ln.substring(10, 20));
    const z = parseFloat(ln.substring(20, 30));
    const sym = (ln.substring(31, 34) || '').trim();
    if (isNaN(x) || isNaN(y) || isNaN(z) || !sym)
      throw new Error('SDF: invalid atom line ' + (5 + k));
    symbols.push(sym);
    positions.push([x, y, z]);
  }
  return [{ symbols, positions }];
}

// ─────────────────────────────────────────────────────────────
// PDB parser (ATOM/HETATM + CRYST1, supports MODEL trajectories)
// ─────────────────────────────────────────────────────────────
function parsePDB(text) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  const frames = [];
  let cur = { symbols: [], positions: [] };
  let cell = null;

  const pushFrame = () => {
    if (cur.symbols.length > 0) {
      const f = { symbols: cur.symbols, positions: cur.positions };
      if (cell) f.cell = cell;
      frames.push(f);
    }
    cur = { symbols: [], positions: [] };
  };

  for (const line of lines) {
    const rec = line.substring(0, 6);
    if (rec === 'CRYST1') {
      const a = parseFloat(line.substring(6, 15));
      const b = parseFloat(line.substring(15, 24));
      const c = parseFloat(line.substring(24, 33));
      const al = parseFloat(line.substring(33, 40));
      const be = parseFloat(line.substring(40, 47));
      const ga = parseFloat(line.substring(47, 54));
      if (!isNaN(a) && !isNaN(b) && !isNaN(c))
        cell = cellABCtoVectors(a, b, c, al, be, ga);
    } else if (rec === 'ATOM  ' || rec === 'HETATM') {
      const x = parseFloat(line.substring(30, 38));
      const y = parseFloat(line.substring(38, 46));
      const z = parseFloat(line.substring(46, 54));
      let elem = (line.substring(76, 78) || '').trim();
      if (!elem) {
        // Fall back to atom name (cols 12-16), strip digits
        const name = (line.substring(12, 16) || '').trim();
        elem = name.replace(/[^A-Za-z]/g, '').slice(0, 2);
        // Prefer single-char element for common cases like "CA" (C-alpha)
        if (elem.length === 2 && /[A-Z][A-Z]/.test(elem)) elem = elem[0];
        else if (elem.length >= 2) elem = elem[0].toUpperCase() + elem[1].toLowerCase();
        else elem = elem.toUpperCase();
      } else {
        elem = elem[0].toUpperCase() + (elem[1] || '').toLowerCase();
      }
      if (isNaN(x) || isNaN(y) || isNaN(z)) continue;
      cur.symbols.push(elem);
      cur.positions.push([x, y, z]);
    } else if (rec.trim() === 'ENDMDL') {
      pushFrame();
    } else if (rec === 'END   ' || line.substring(0, 3) === 'END') {
      // 'END' terminates the file in many PDBs
    }
  }
  pushFrame();
  if (frames.length === 0) throw new Error('PDB: no ATOM/HETATM records found');
  return frames;
}

// ─────────────────────────────────────────────────────────────
// JSON parser
// ─────────────────────────────────────────────────────────────
function parseJSON(text) {
  const obj = JSON.parse(text);
  // NormalMode format: {atoms, vibrationData}
  if (obj.atoms && obj.vibrationData) return { type: 'normalMode', ...obj };
  // Array of frames
  if (Array.isArray(obj)) return { type: 'trajectory', frames: obj };
  // Single frame
  if (obj.symbols && obj.positions) return { type: 'single', frames: [obj] };
  throw new Error('Unrecognized JSON structure');
}

// ─────────────────────────────────────────────────────────────
// Viewer state
// ─────────────────────────────────────────────────────────────
let currentViewer = null;
let currentType = 'MolecularViewer';

function setStatus(msg, kind = '') {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = 'status-dot' + (kind ? ' ' + kind : '');
  txt.textContent = msg;
}

function showToast(msg, kind = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast-' + kind + ' show';
  clearTimeout(t._tid);
  t._tid = setTimeout(() => { t.className = ''; }, 2800);
}

function createViewer(type) {
  const container = document.getElementById('viewer-container');
  container.innerHTML = '';
  container.style.width  = '100%';
  container.style.height = '100%';

  if (currentViewer && typeof currentViewer.dispose === 'function') {
    currentViewer.dispose();
  }

  const badge = document.getElementById('viewer-badge');
  badge.textContent = type;
  document.getElementById('viewer-type').value = type;
  currentType = type;
  updateHelpBody(type);

  // Update file input: OverlayViewer allows multiple files
  const fi = document.getElementById('file-input');
  const CHEM_ACCEPT = '.xyz,.extxyz,.poscar,.vasp,.cif,.sdf,.mol,.pdb,.ent,POSCAR,CONTCAR';
  if (type === 'OverlayViewer') {
    fi.multiple = true;
    fi.accept = CHEM_ACCEPT;
  } else if (type === 'NormalModeViewer') {
    fi.multiple = false;
    fi.accept = '.json';
  } else {
    fi.multiple = false;
    fi.accept = CHEM_ACCEPT;
  }

  try {
    currentViewer = new ASEView[type]('#viewer-container');
    setStatus('Viewer ready — load a file or try the sample', 'ok');
  } catch (e) {
    setStatus('Failed to create viewer: ' + e.message, 'err');
  }
}

// ─────────────────────────────────────────────────────────────
// Data loading
// ─────────────────────────────────────────────────────────────
function loadDataIntoViewer(parsedFrames, sourceLabel) {
  if (!currentViewer) return;

  try {
    if (currentType === 'MolecularViewer') {
      currentViewer.setData(parsedFrames);
      setStatus('Loaded ' + parsedFrames.length + ' frame(s) — ' + sourceLabel, 'ok');
      showToast('Loaded ' + parsedFrames.length + ' frame(s)');
    } else if (currentType === 'OverlayViewer') {
      currentViewer.setData(parsedFrames);
      setStatus('Loaded ' + parsedFrames.length + ' structure(s) — ' + sourceLabel, 'ok');
      showToast('Loaded ' + parsedFrames.length + ' structure(s)');
    } else if (currentType === 'FragSelector') {
      currentViewer.setData(parsedFrames[0]);
      setStatus('Loaded ' + parsedFrames[0].symbols.length + ' atoms — ' + sourceLabel, 'ok');
      showToast('Loaded ' + parsedFrames[0].symbols.length + ' atoms');
    }
  } catch (e) {
    setStatus('Error loading data: ' + e.message, 'err');
    showToast('Error: ' + e.message, 'err');
  }
}

function loadNormalModeData(parsed, sourceLabel) {
  if (!currentViewer || currentType !== 'NormalModeViewer') return;
  try {
    currentViewer.setVibrationData(parsed.atoms, parsed.vibrationData);
    const nModes = parsed.vibrationData.modeVectors.length;
    setStatus('Loaded ' + nModes + ' mode(s) — ' + sourceLabel, 'ok');
    showToast('Loaded ' + nModes + ' vibrational mode(s)');
  } catch (e) {
    setStatus('Error loading vibration data: ' + e.message, 'err');
    showToast('Error: ' + e.message, 'err');
  }
}

// ─────────────────────────────────────────────────────────────
// Format detection & unified text handler
// ─────────────────────────────────────────────────────────────
function getSelectedFormat() {
  return document.getElementById('format-type').value;  // 'auto' | 'xyz' | 'poscar' | 'cif' | 'sdf' | 'pdb'
}

function detectFormat(text, hintName) {
  const sel = getSelectedFormat();
  if (sel !== 'auto') return sel;

  // Hint from filename (full name or extension)
  if (hintName) {
    const base = hintName.split('/').pop();
    const low  = base.toLowerCase();
    if (/^(poscar|contcar)(\..*)?$/.test(low)) return 'poscar';
    const ext = low.includes('.') ? low.split('.').pop() : '';
    if (ext === 'xyz' || ext === 'extxyz') return 'xyz';
    if (ext === 'json') return 'json';
    if (ext === 'poscar' || ext === 'vasp') return 'poscar';
    if (ext === 'cif')  return 'cif';
    if (ext === 'sdf' || ext === 'mol') return 'sdf';
    if (ext === 'pdb' || ext === 'ent') return 'pdb';
  }

  // Content sniffing
  const trimmed = text.trim();
  if (trimmed.startsWith('{') || trimmed.startsWith('[')) return 'json';
  if (/^data_/m.test(text) && /_atom_site_/i.test(text)) return 'cif';
  if (/^(ATOM  |HETATM|CRYST1|MODEL )/m.test(text)) return 'pdb';
  if (/V2000\s*$/m.test(text) || /\$\$\$\$/.test(text)) return 'sdf';
  // XYZ starts with an integer line
  const firstLine = trimmed.split('\n', 1)[0].trim();
  if (/^\d+$/.test(firstLine)) return 'xyz';
  // Otherwise, assume POSCAR (free-form)
  return 'poscar';
}

function handleText(text, label, hintName) {
  const fmt = detectFormat(text, hintName);

  // NormalModeViewer only accepts JSON vibration data
  if (currentType === 'NormalModeViewer') {
    if (fmt !== 'json')
      throw new Error('NormalModeViewer requires JSON {atoms, vibrationData}');
    const parsed = parseJSON(text);
    if (parsed.type !== 'normalMode')
      throw new Error('JSON must contain "atoms" and "vibrationData"');
    loadNormalModeData(parsed, label);
    return;
  }

  let frames;
  switch (fmt) {
    case 'xyz':    frames = parseXYZ(text); break;
    case 'poscar': frames = parsePOSCAR(text); break;
    case 'cif':    frames = parseCIF(text); break;
    case 'sdf':    frames = parseSDF(text); break;
    case 'pdb':    frames = parsePDB(text); break;
    case 'json': {
      const parsed = parseJSON(text);
      frames = parsed.frames || [];
      break;
    }
    default: throw new Error('Unknown format: ' + fmt);
  }

  if (!frames || frames.length === 0)
    throw new Error('No valid structures found in ' + fmt.toUpperCase() + ' data');

  loadDataIntoViewer(frames, label);
}

// ─────────────────────────────────────────────────────────────
// File reading
// ─────────────────────────────────────────────────────────────
function readFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = e => resolve(e.target.result);
    reader.onerror = () => reject(new Error('Failed to read ' + file.name));
    reader.readAsText(file);
  });
}

async function handleFiles(files) {
  if (!files || files.length === 0) return;
  setStatus('Reading file(s)…', '');

  const parseByFormat = (text, name) => {
    const fmt = detectFormat(text, name);
    switch (fmt) {
      case 'xyz':    return parseXYZ(text);
      case 'poscar': return parsePOSCAR(text);
      case 'cif':    return parseCIF(text);
      case 'sdf':    return parseSDF(text);
      case 'pdb':    return parsePDB(text);
      case 'json': {
        const p = parseJSON(text);
        return p.frames || [];
      }
      default: throw new Error('Unknown format: ' + fmt);
    }
  };

  try {
    if (currentType === 'OverlayViewer' && files.length > 1) {
      const structs = [];
      for (const f of files) {
        const text = await readFile(f);
        const frames = parseByFormat(text, f.name);
        if (frames && frames.length) structs.push(frames[0]);
      }
      if (structs.length === 0) throw new Error('No valid structures found in files');
      loadDataIntoViewer(structs, files.length + ' files');
      return;
    }

    const file = files[0];
    const text = await readFile(file);
    handleText(text, file.name, file.name);

  } catch (e) {
    setStatus('Error: ' + e.message, 'err');
    showToast('Error: ' + e.message, 'err');
  }
}

// ─────────────────────────────────────────────────────────────
// Paste modal
// ─────────────────────────────────────────────────────────────
function openPasteModal(initialText) {
  const backdrop = document.getElementById('paste-backdrop');
  const area = document.getElementById('paste-area');
  backdrop.classList.add('open');
  if (initialText) area.value = initialText;
  area.focus();
}

function closePasteModal() {
  document.getElementById('paste-backdrop').classList.remove('open');
}

function loadFromPaste() {
  const text = document.getElementById('paste-area').value.trim();
  if (!text) { showToast('Nothing to load', 'err'); return; }
  closePasteModal();
  try {
    handleText(text, 'pasted data');
  } catch (e) {
    setStatus('Error: ' + e.message, 'err');
    showToast('Error: ' + e.message, 'err');
  }
}

// ─────────────────────────────────────────────────────────────
// Sample data loading
// ─────────────────────────────────────────────────────────────
function loadSample() {
  const s = SAMPLES[currentType];
  if (!s) return;

  if (currentType === 'NormalModeViewer') {
    loadNormalModeData(s, s.label);
  } else if (currentType === 'OverlayViewer') {
    loadDataIntoViewer(s.data, s.label);
  } else if (currentType === 'MolecularViewer') {
    loadDataIntoViewer(s.data, s.label);
  } else if (currentType === 'FragSelector') {
    loadDataIntoViewer([s.data], s.label);
  }
}

// ─────────────────────────────────────────────────────────────
// Help panel
// ─────────────────────────────────────────────────────────────
function updateHelpBody(type) {
  document.getElementById('help-body').innerHTML = HELP[type] || '';
}

// ─────────────────────────────────────────────────────────────
// Event listeners
// ─────────────────────────────────────────────────────────────
document.getElementById('viewer-type').addEventListener('change', function () {
  createViewer(this.value);
});

document.getElementById('upload-btn').addEventListener('click', () => {
  document.getElementById('file-input').click();
});

document.getElementById('file-input').addEventListener('change', function () {
  if (this.files && this.files.length > 0) {
    handleFiles(this.files);
    this.value = '';
  }
});

document.getElementById('sample-btn').addEventListener('click', loadSample);

// Paste modal controls
document.getElementById('paste-btn').addEventListener('click', () => openPasteModal());
document.getElementById('paste-close').addEventListener('click', closePasteModal);
document.getElementById('paste-load-btn').addEventListener('click', loadFromPaste);
document.getElementById('paste-backdrop').addEventListener('click', e => {
  if (e.target === e.currentTarget) closePasteModal();
});
document.getElementById('paste-area').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); loadFromPaste(); }
  if (e.key === 'Escape') closePasteModal();
});

// Global Ctrl+V: open paste modal with clipboard content
document.addEventListener('paste', e => {
  // Ignore if focus is inside the paste textarea or an iframe
  if (document.activeElement && (document.activeElement.tagName === 'TEXTAREA' ||
      document.activeElement.tagName === 'INPUT')) return;
  const text = (e.clipboardData || window.clipboardData).getData('text');
  if (text && text.trim()) {
    e.preventDefault();
    openPasteModal(text);
  }
});

document.getElementById('help-toggle').addEventListener('click', () => {
  document.getElementById('help-panel').classList.toggle('collapsed');
});

// Drag & drop on viewer area
const wrap = document.getElementById('viewer-wrap');
const dropOverlay = document.getElementById('drop-overlay');

wrap.addEventListener('dragenter', e => { e.preventDefault(); dropOverlay.classList.add('active'); });
wrap.addEventListener('dragleave', e => { if (!wrap.contains(e.relatedTarget)) dropOverlay.classList.remove('active'); });
wrap.addEventListener('dragover',  e => { e.preventDefault(); });
wrap.addEventListener('drop', e => {
  e.preventDefault();
  dropOverlay.classList.remove('active');
  const files = e.dataTransfer.files;
  if (files.length) handleFiles(files);
});

// ─────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────
createViewer('MolecularViewer');
// Auto-load sample on first visit
setTimeout(loadSample, 800);
</script>
